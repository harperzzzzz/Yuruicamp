<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Yuruicamp 全系列露營裝備 - 帳篷、背包、炊具、睡袋、照明一次購齊。篩選品牌、分類、價格輕鬆找到心儀商品。">
  <meta name="theme-color" content="#244d4d">
  <title>商品列表 - Yuruicamp 露營選物</title>
  <!-- 預先連線外部資源，減少 DNS 查詢延遲 / Preconnect to reduce DNS lookup latency -->
  <link rel="preconnect" href="https://picsum.photos">
  <link rel="dns-prefetch" href="https://picsum.photos">
  <link rel="stylesheet" href="../css/main.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏕️</text></svg>">
</head>
<body>

 <div id="header"></div>

  
  <!-- ===================================================
       頁面頂部 Banner（商品列表頁小型 Banner）
       =================================================== -->
  <div class="pageBanner">
    <div class="container">
      <!-- 麵包屑 -->
      <ol class="breadcrumb">
        <li class="breadcrumbItem"><a href="home.html">首頁</a></li>
        <li class="breadcrumbItem">/</li>
        <li class="breadcrumbItem active">全部商品</li>
      </ol>
      <h1 class="pageBannerTitle">全部商品</h1>
      <p class="pageBannerSub">精選 18 款頂級露營裝備，探索你的下一個冒險</p>
    </div>
  </div>

  <!-- ===================================================
       廣告輪播系統（優先依 surveyTags / interest_tags 推薦）
       Advertisement Carousel (Personalized Products)
       =================================================== -->
  <div class="adCarouselContainer">
    <div class="adCarousel">
      <div class="adCarouselSlides" id="adCarouselSlides">
        <!-- 重點：由 JS 動態生成，優先抓取符合使用者 surveyTags 的 interest_tags 商品。 -->
      </div>
      <button class="adCarouselBtn adCarouselPrev" id="adCarouselPrev" title="上一個" aria-label="上一個廣告">❮</button>
      <button class="adCarouselBtn adCarouselNext" id="adCarouselNext" title="下一個" aria-label="下一個廣告">❯</button>
      <div class="adCarouselDots" id="adCarouselDots">
        <!-- 由 JS 動態生成 dot indicators -->
      </div>
    </div>
  </div>

  <!-- ===================================================
       主內容：側邊欄 + 商品網格
       =================================================== -->
  <main class="productsPageMain">
    <div class="container">
      <div class="productsPageLayout">

        <!-- =============================================
             步驟 5.1：PC 版篩選側邊欄
             在手機版會被隱藏（CSS .hiddenMobile for sidebar）
             ============================================= -->
        <aside class="filterSidebar" id="filterSidebar">

          <!-- 側邊欄標題 + 重置按鈕 -->
          <div class="filterSidebarTitle">
            篩選商品
            <button class="filterResetBtn" id="resetFiltersBtn" title="清除所有篩選">清除</button>
          </div>

          <!-- 篩選：分類 -->
          <div class="filterGroup">
            <p class="filterGroupTitle">商品分類</p>
            <ul class="filterCategoryList" id="categoryFilterList">
              <!-- 由 JS 動態生成 -->
              <li>
                <button class="filterCategoryBtn active" data-category="">全部</button>
              </li>
            </ul>
          </div>

          <!-- 篩選：價格範圍 -->
          <div class="filterGroup">
            <p class="filterGroupTitle">價格範圍 (NT$)</p>
            <div class="filterPriceRange">
              <div class="filterPriceInputs">
                <input
                  type="number"
                  id="priceMin"
                  placeholder="最低"
                  min="0"
                  step="100"
                  aria-label="最低價格"
                >
                <span class="filterPriceSep">—</span>
                <input
                  type="number"
                  id="priceMax"
                  placeholder="最高"
                  min="0"
                  step="100"
                  aria-label="最高價格"
                >
              </div>
              <button
                class="btn btnOutline btnSm productPriceApply"
                id="applyPriceBtn"
              >
                套用
              </button>
            </div>
          </div>

          <!-- 篩選：品牌（Checkbox 清單） -->
          <div class="filterGroup">
            <p class="filterGroupTitle">品牌</p>
            <ul class="filterBrandList" id="brandFilterList">
              <!-- 由 JS 動態生成 -->
            </ul>
          </div>

          <!-- 篩選：標籤快選 -->
          <div class="filterGroup">
            <p class="filterGroupTitle">快選</p>
            <ul class="filterCategoryList">
              <li>
                <button class="filterCategoryBtn" data-tag="new" id="filterNewBtn">最新商品</button>
              </li>
              <li>
                <button class="filterCategoryBtn" data-tag="bestseller" id="filterBestBtn">熱銷商品</button>
              </li>
            </ul>
          </div>

        </aside>

        <!-- =============================================
             步驟 5.2：商品主區域（工具列 + 網格）
             ============================================= -->
        <div class="productsListContent">

          <!-- 工具列：商品數量 + 排序下拉 -->
          <div class="productListToolbar">
            <span class="productCount" id="productCount">共 0 件商品</span>
            <select class="productSortSelect" id="sortSelect" aria-label="排序方式">
              <option value="default">預設排序</option>
              <option value="price-asc">價格：低到高</option>
              <option value="price-desc">價格：高到低</option>
              <option value="rating">評分最高</option>
              <option value="reviews">評論最多</option>
            </select>
          </div>

          <!-- 商品網格（由 JS 動態生成） -->
          <div class="productsGrid" id="productsGrid">
            <!-- 骨架屏加載佔位 -->
            <div class="skeletonCard"><div class="skeletonImg"></div><div class="skeletonBody"><div class="skeletonLine short"></div><div class="skeletonLine long"></div><div class="skeletonLine price"></div></div></div>
            <div class="skeletonCard"><div class="skeletonImg"></div><div class="skeletonBody"><div class="skeletonLine short"></div><div class="skeletonLine long"></div><div class="skeletonLine price"></div></div></div>
            <div class="skeletonCard"><div class="skeletonImg"></div><div class="skeletonBody"><div class="skeletonLine short"></div><div class="skeletonLine long"></div><div class="skeletonLine price"></div></div></div>
            <div class="skeletonCard"><div class="skeletonImg"></div><div class="skeletonBody"><div class="skeletonLine short"></div><div class="skeletonLine long"></div><div class="skeletonLine price"></div></div></div>
            <div class="skeletonCard"><div class="skeletonImg"></div><div class="skeletonBody"><div class="skeletonLine short"></div><div class="skeletonLine long"></div><div class="skeletonLine price"></div></div></div>
            <div class="skeletonCard"><div class="skeletonImg"></div><div class="skeletonBody"><div class="skeletonLine short"></div><div class="skeletonLine long"></div><div class="skeletonLine price"></div></div></div>
          </div>

          <!-- 分頁 -->
          <div class="pagination productPagination" id="pagination" hidden>
            <!-- 由 JS 動態生成 -->
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- ===================================================
       步驟 5.3：手機版底部篩選按鈕（固定）
       =================================================== -->
  <button class="mobileFilterBtn" id="mobileFilterBtn" aria-label="開啟篩選">篩選</button>

  <!-- ===================================================
       步驟 5.3：手機版 Bottom Sheet（由下往上滑出）
       =================================================== -->
  <div id="filterSheet" class="filterSheet" role="dialog" aria-modal="true" aria-label="商品篩選">
    <!-- 拖動把手 -->
    <div class="filterSheetHandle"></div>

    <!-- 標題 -->
    <div class="filterSheetHeader">
      <h3 class="filterSheetTitle">篩選商品</h3>
      <button class="filterSheetClose" id="filterSheetClose" aria-label="關閉">✕</button>
    </div>

    <!-- 分類（Chip 樣式） -->
    <div class="filterGroup">
      <p class="filterGroupTitle">商品分類</p>
      <ul class="filterCategoryList" id="mobileCategoryFilterList">
        <li><button class="filterCategoryBtn active" data-category="">全部</button></li>
      </ul>
    </div>

    <!-- 價格 -->
    <div class="filterGroup">
      <p class="filterGroupTitle">價格範圍 (NT$)</p>
      <div class="filterPriceInputs">
        <input type="number" id="mobilePriceMin" placeholder="最低" min="0" step="100" aria-label="最低價格">
        <span class="filterPriceSep">—</span>
        <input type="number" id="mobilePriceMax" placeholder="最高" min="0" step="100" aria-label="最高價格">
      </div>
    </div>

    <!-- 品牌 -->
    <div class="filterGroup">
      <p class="filterGroupTitle">品牌</p>
      <ul class="filterBrandList" id="mobileBrandFilterList">
      </ul>
    </div>

    <!-- 底部：重置 + 應用 -->
    <div class="filterSheetFooter">
      <button class="btn btnOutline mobileFilterReset" id="mobileResetBtn">重置篩選</button>
      <button class="btn btnPrimary mobileFilterApply" id="mobileApplyBtn">套用篩選</button>
    </div>
  </div>

  <!-- Filter Sheet 背景遮罩 -->
  <div class="offcanvasBackdrop" id="filterSheetBackdrop"></div>

   <div id="footer"></div>

  <!-- ===================================================
       JavaScript 載入
       =================================================== -->
  <script src="../js/config.js" defer></script>
  <script src="../js/storage.js" defer></script>
  <script src="../js/state.js" defer></script>
  <script src="../js/formatters.js" defer></script>
  <script src="../js/validators.js" defer></script>
  <script src="../js/cart-service.js" defer></script>
  <script src="../js/api-mock.js" defer></script>
  <script src="../js/components/toast.js" defer></script>
  <script src="../js/components/modal.js" defer></script>
  <script src="../js/components/header.js" defer></script>
  <script src="../js/components/cart.js" defer></script>
  <script src="../js/components/filter.js" defer></script>
  
  <script src="../js/pages/product-list.js" defer></script>
  <script src="../js/main.js" defer></script>

</body>
</html>
