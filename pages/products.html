<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Yuruicamp 裝備商城 - 帳篷、睡袋、炊具、照明與各類露營用品一應俱全。依品牌、分類、價格與個人偏好篩選商品。">
  <meta name="theme-color" content="#244d4d">
  <title>商品列表 - Yuruicamp 露營選物</title>
  <link rel="preconnect" href="https://picsum.photos">
  <link rel="dns-prefetch" href="https://picsum.photos">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏕️</text></svg>">
</head>
<body>
 <div id="header"></div>
  <div class="pageBanner">
    <div class="container">
      <ol class="breadcrumb">
        <li class="breadcrumbItem"><a href="home.html">首頁</a></li>
        <li class="breadcrumbItem">/</li>
        <li class="breadcrumbItem isSelected">所有商品</li>
      </ol>
      <h1 class="pageBannerTitle">所有商品</h1>
      <p class="pageBannerSub">精選 18 大類露營裝備，陪你走向下一個營地</p>
    </div>
  </div>
  <div class="adCarouselContainer">
    <div class="adCarousel">
      <div class="adCarouselSlides" id="adCarouselSlides"></div>
      <button class="adCarouselBtn adCarouselPrev" id="adCarouselPrev" title="上一張" aria-label="上一張廣告">‹</button>
      <button class="adCarouselBtn adCarouselNext" id="adCarouselNext" title="下一張" aria-label="下一張廣告">›</button>
      <div class="adCarouselDots" id="adCarouselDots"></div>
    </div>
  </div>
  <main class="productsPageMain">
    <div class="container">
      <div class="productsPageLayout">
        <aside class="filterSidebar" id="filterSidebar">
          <div class="filterSidebarTitle">篩選條件<button class="filterResetBtn" id="resetFiltersBtn" title="清除所有篩選">清除</button></div>
          <div class="filterGroup">
            <p class="filterGroupTitle">商品分類</p>
            <ul class="filterCategoryList" id="categoryFilterList"><li><button class="filterCategoryBtn isSelected" data-category="">全部</button></li></ul>
          </div>
          <div class="filterGroup">
            <p class="filterGroupTitle">價格區間 (NT$)</p>
            <div class="filterPriceRange">
              <div class="filterPriceInputs">
                <input type="number" id="priceMin" placeholder="最低" min="0" step="100" aria-label="最低價格">
                <span class="filterPriceSep">—</span>
                <input type="number" id="priceMax" placeholder="最高" min="0" step="100" aria-label="最高價格">
              </div>
              <button class="btn btnOutline btnSm productPriceApply" id="applyPriceBtn">套用</button>
            </div>
          </div>
          <div class="filterGroup">
            <p class="filterGroupTitle">品牌</p>
            <ul class="filterBrandList" id="brandFilterList"></ul>
          </div>
          <div class="filterGroup">
            <p class="filterGroupTitle">標籤</p>
            <ul class="filterCategoryList">
              <li><button class="filterCategoryBtn" data-tag="new" id="filterNewBtn">最新上架</button></li>
              <li><button class="filterCategoryBtn" data-tag="bestseller" id="filterBestBtn">熱銷商品</button></li>
            </ul>
          </div>
        </aside>
        <div class="productsListContent">
          <div class="productListToolbar">
            <span class="productCount" id="productCount">共 0 件商品</span>
            <select class="productSortSelect" id="sortSelect" aria-label="排序方式">
              <option value="default">預設排序</option>
              <option value="price-asc">價格：低到高</option>
              <option value="price-desc">價格：高到低</option>
              <option value="rating">評價最高</option>
              <option value="reviews">評論最多</option>
            </select>
          </div>
          <div class="productsGrid" id="productsGrid">
            <div class="skeletonCard"><div class="skeletonImg"></div><div class="skeletonBody"><div class="skeletonLine short"></div><div class="skeletonLine long"></div><div class="skeletonLine price"></div></div></div>
            <div class="skeletonCard"><div class="skeletonImg"></div><div class="skeletonBody"><div class="skeletonLine short"></div><div class="skeletonLine long"></div><div class="skeletonLine price"></div></div></div>
            <div class="skeletonCard"><div class="skeletonImg"></div><div class="skeletonBody"><div class="skeletonLine short"></div><div class="skeletonLine long"></div><div class="skeletonLine price"></div></div></div>
            <div class="skeletonCard"><div class="skeletonImg"></div><div class="skeletonBody"><div class="skeletonLine short"></div><div class="skeletonLine long"></div><div class="skeletonLine price"></div></div></div>
            <div class="skeletonCard"><div class="skeletonImg"></div><div class="skeletonBody"><div class="skeletonLine short"></div><div class="skeletonLine long"></div><div class="skeletonLine price"></div></div></div>
            <div class="skeletonCard"><div class="skeletonImg"></div><div class="skeletonBody"><div class="skeletonLine short"></div><div class="skeletonLine long"></div><div class="skeletonLine price"></div></div></div>
          </div>
          <div class="pagination productPagination" id="pagination" hidden></div>
        </div>
      </div>
    </div>
  </main>
  <button class="mobileFilterBtn" id="mobileFilterBtn" aria-label="開啟篩選">篩選</button>
  <div id="filterSheet" class="filterSheet" role="dialog" aria-modal="true" aria-label="商品篩選">
    <div class="filterSheetHandle"></div>
    <div class="filterSheetHeader">
      <h3 class="filterSheetTitle">篩選條件</h3>
      <button class="filterSheetClose" id="filterSheetClose" aria-label="關閉">×</button>
    </div>
    <div class="filterGroup">
      <p class="filterGroupTitle">商品分類</p>
      <ul class="filterCategoryList" id="mobileCategoryFilterList"><li><button class="filterCategoryBtn isSelected" data-category="">全部</button></li></ul>
    </div>
    <div class="filterGroup">
      <p class="filterGroupTitle">價格區間 (NT$)</p>
      <div class="filterPriceInputs">
        <input type="number" id="mobilePriceMin" placeholder="最低" min="0" step="100" aria-label="最低價格">
        <span class="filterPriceSep">—</span>
        <input type="number" id="mobilePriceMax" placeholder="最高" min="0" step="100" aria-label="最高價格">
      </div>
    </div>
    <div class="filterGroup">
      <p class="filterGroupTitle">品牌</p>
      <ul class="filterBrandList" id="mobileBrandFilterList"></ul>
    </div>
    <div class="filterSheetFooter">
      <button class="btn btnOutline mobileFilterReset" id="mobileResetBtn">重設篩選</button>
      <button class="btn btnPrimary mobileFilterApply" id="mobileApplyBtn">套用篩選</button>
    </div>
  </div>
  <div class="offcanvasBackdrop" id="filterSheetBackdrop"></div>
  <div id="footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
  <script src="../js/config.js" defer></script>
  <script src="../js/storage.js" defer></script>
  <script src="../js/state.js" defer></script>
  <script src="../js/formatters.js" defer></script>
  <script src="../js/data-paths.js" defer></script>
  <script src="../js/validators.js" defer></script>
  <script src="../js/cart-service.js" defer></script>
  <script src="../js/api-mock.js" defer></script>
  <script src="../js/components/toast.js" defer></script>
  <script src="../js/components/modal.js" defer></script>
  <script src="../js/components/header.js" defer></script>
  <script src="../js/components/cart.js" defer></script>
  <script src="../js/components/filter.js" defer></script>
  <script src="../js/components/card-gallery.js" defer></script>
  <script src="../js/pages/product-list.js" defer></script>
  <script src="../js/main.js" defer></script>
</body>
</html>
