<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Yuruicamp 露營生活誌 - 文章閱讀頁" />
    <meta name="theme-color" content="#244d4d" />
    <title>文章閱讀 - Yuruicamp 露營選物</title>
    <link rel="preconnect" href="https://picsum.photos" />
    <link rel="dns-prefetch" href="https://picsum.photos" />
    <link rel="stylesheet" href="../css/main.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏕️</text></svg>"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="header"></div>

    <main class="blogDetailPage">
      <div class="blogDetailLayout">
        <article class="blogDetail" aria-labelledby="articleTitle">
          <nav class="blogDetailBreadcrumb" id="breadcrumb" aria-label="麵包屑">
            <ol class="blogDetailBreadcrumbList">
              <li class="blogDetailBreadcrumbItem">
                <a class="blogDetailBreadcrumbLink" href="home.html">首頁</a>
              </li>
              <li class="blogDetailBreadcrumbItem" aria-hidden="true">
                <span class="blogDetailBreadcrumbSeparator">/</span>
              </li>
              <li class="blogDetailBreadcrumbItem">
                <a class="blogDetailBreadcrumbLink" href="blog.html">露營生活誌</a>
              </li>
              <li class="blogDetailBreadcrumbItem" aria-hidden="true">
                <span class="blogDetailBreadcrumbSeparator">/</span>
              </li>
              <li class="blogDetailBreadcrumbItem">
                <span class="blogDetailBreadcrumbCurrent" id="breadcrumbTitle" aria-current="page">載入中...</span>
              </li>
            </ol>
          </nav>

          <figure class="blogDetailHero">
            <img
              class="blogDetailHeroImage"
              id="articleHeroImg"
              src="https://picsum.photos/seed/yurui-blog-detail-default/1200/640"
              alt="文章封面圖"
              loading="eager"
            />
          </figure>

          <div class="blogDetailMeta">
            <span class="blogDetailCategory" id="articleCategory">載入中</span>
            <span class="blogDetailAuthor">
              <img
                class="blogDetailAuthorAvatar"
                id="articleAuthorAvatar"
                src="https://picsum.photos/seed/yurui-author-default/80/80"
                alt="作者頭像"
                loading="lazy"
              />
              <span class="blogDetailAuthorName" id="articleAuthorName">作者</span>
            </span>
            <time class="blogDetailPublishedDate" id="articleDate" datetime="">日期</time>
            <span class="blogDetailReadTime" id="articleReadTime">閱讀時間</span>
          </div>

          <h1 class="blogDetailTitle" id="articleTitle">載入中...</h1>

          <section class="blogDetailBody isLoading" id="articleContent" aria-live="polite">
            <div class="blogDetailLoadingState" role="status">
              <span class="blogDetailLoadingIcon" aria-hidden="true"></span>
              <span>正在載入文章內容...</span>
            </div>
          </section>

          <ul class="blogDetailTags" id="articleTags" aria-label="文章標籤"></ul>

          <section class="blogRelatedSection" id="relatedArticlesSection" aria-labelledby="relatedArticlesTitle">
            <h2 class="blogRelatedTitle" id="relatedArticlesTitle">相關文章</h2>
            <div class="blogRelatedGrid" id="relatedArticlesGrid">
              <div class="blogDetailLoadingState" role="status">
                <span class="blogDetailLoadingIcon" aria-hidden="true"></span>
                <span>正在載入相關文章...</span>
              </div>
            </div>
          </section>
        </article>
      </div>
    </main>

    <div id="footer"></div>
    <script src="../js/config.js" defer></script>
    <script src="../js/storage.js" defer></script>
    <script src="../js/state.js" defer></script>
    <script src="../js/formatters.js" defer></script>
    <script src="../js/validators.js" defer></script>
    <script src="../js/cart-service.js" defer></script>
    <script src="../js/api-mock.js" defer></script>
    <script src="../js/components/toast.js" defer></script>
    <script src="../js/components/modal.js" defer></script>
    <script src="../js/components/header.js" defer></script>
    <script src="../js/components/cart.js" defer></script>
    <script src="../js/pages/blog-detail.js" defer></script>
    <script src="../js/main.js" defer></script>
  </body>
</html>
