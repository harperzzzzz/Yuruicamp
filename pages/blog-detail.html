<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Yuruicamp 露營生活誌 - 文章閱讀頁" />
    <meta name="theme-color" content="#244d4d" />
    <title>文章閱讀 - Yuruicamp 露營選物</title>
    <!-- 預先連線外部資源，減少 DNS 查詢延遲 / Preconnect to reduce DNS lookup latency -->
    <link rel="preconnect" href="https://picsum.photos" />
    <link rel="dns-prefetch" href="https://picsum.photos" />
    <link rel="stylesheet" href="../css/main.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏕️</text></svg>"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="header"></div>

    <!-- ===================================================
       主要內容 - 文章閱讀頁
       =================================================== -->
    <main>
      <!-- 中央單欄佈局（限制最大寬度 720px）-->
      <!-- Single column layout with max-width 720px -->
      <div class="container u-migrated-001">
        <div class="articleContainer">
          <!-- 麵包屑導航 Breadcrumb -->
          <nav class="breadcrumb" id="breadcrumb" aria-label="麵包屑">
            <a href="home.html">首頁</a>
            <span class="breadcrumb-sep">›</span>
            <a href="blog.html">部落格</a>
            <span class="breadcrumb-sep">›</span>
            <span id="breadcrumbTitle">載入中...</span>
          </nav>

          <!-- 文章 Hero 圖片 Article hero image -->
          <img
            id="articleHeroImg"
            class="article-hero-img"
            src="https://picsum.photos/seed/default/1200/514"
            alt="文章封面圖"
            loading="eager"
          />

          <!-- 文章 Metadata 區塊 Article metadata block -->
          <div class="article-detail-meta">
            <span class="article-detail-badge" id="articleCategory">載入中</span>
            <div class="article-detail-author">
              <img
                id="articleAuthorAvatar"
                src="https://picsum.photos/seed/default/40/40"
                alt="作者頭像"
                loading="lazy"
              />
              <span class="authorName" id="articleAuthorName">作者</span>
            </div>
            <span class="articleMeta" id="articleDate">日期</span>
            <span class="articleMeta" id="articleReadTime">閱讀時間</span>
          </div>

          <!-- 文章標題 Article title -->
          <h1 class="articleTitle" id="articleTitle">載入中...</h1>

          <!-- 文章內容 Article content (rendered by JS) -->
          <div class="article-content" id="articleContent">
            <div class="loadingText">
              <div class="u-migrated-008">📄</div>
              <p>正在載入文章內容...</p>
            </div>
          </div>

          <!-- 文章標籤 Article tags -->
          <div class="articleTags" id="articleTags">
            <!-- JS 渲染標籤 -->
          </div>

          <!-- 分隔線 Divider -->
          <hr class="divider" />

          <!-- 相關文章推薦 Related articles -->
          <section class="relatedArticlesSection" id="relatedArticlesSection">
            <h3 class="relatedText">📖 相關文章</h3>
            <div class="related-articles-grid" id="relatedArticlesGrid">
              <!-- JS 渲染相關文章 -->
            </div>
          </section>
        </div>
      </div>
    </main>

    <div id="footer"></div>
    <!-- ===================================================
       Script 載入（同 blog.html，但換成 blog-detail.js）
       =================================================== -->
    <script src="../js/config.js" defer></script>
    <script src="../js/storage.js" defer></script>
    <script src="../js/state.js" defer></script>
    <script src="../js/formatters.js" defer></script>
    <script src="../js/validators.js" defer></script>
    <script src="../js/cart-service.js" defer></script>
    <script src="../js/api-mock.js" defer></script>
    <script src="../js/components/toast.js" defer></script>
    <script src="../js/components/modal.js" defer></script>
    <script src="../js/components/header.js" defer></script>
    <script src="../js/components/cart.js" defer></script>
    <script src="../js/pages/blog-detail.js" defer></script>
    <script src="../js/main.js" defer></script>
  </body>
</html>
