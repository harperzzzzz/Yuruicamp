<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Yuruicamp 露營生活誌 - 文章閱讀頁">
  <meta name="theme-color" content="#FAF7ED">
  <title>文章閱讀 - Yuruicamp 露營選物</title>
  <!-- 預先連線外部資源，減少 DNS 查詢延遲 / Preconnect to reduce DNS lookup latency -->
  <link rel="preconnect" href="https://picsum.photos">
  <link rel="dns-prefetch" href="https://picsum.photos">
  <link rel="stylesheet" href="../css/main.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/theme/theme-tokens.css">
  <link rel="stylesheet" href="../css/theme/theme-base.css">
  <link rel="stylesheet" href="../css/theme/theme-components.css">
  <link rel="stylesheet" href="../css/theme/theme-layout.css">
  <link rel="stylesheet" href="../css/theme/theme-header.css">
  <link rel="stylesheet" href="../css/theme/pages/blog-detail.css">
  <link rel="icon" type="image/svg+xml" href="../assets/icons/yuruicamp-favicon.svg">
</head>
<body class="yr-theme yr-blog-detail-page">

  <div id="header" data-header-context="shop"></div>

  
  <!-- ===================================================
       主要內容 - 文章閱讀頁
       =================================================== -->
  <main>
    <!-- 中央單欄佈局（限制最大寬度 720px）-->
    <!-- Single column layout with max-width 720px -->
    <div class="container yr-article-shell">
      <div class="yr-article">

        <!-- 麵包屑導航 Breadcrumb -->
        <nav class="breadcrumb yr-article-breadcrumb" id="breadcrumb" aria-label="麵包屑">
          <a href="home.html">首頁</a>
          <span class="breadcrumb-sep"><i class="bi bi-chevron-right" aria-hidden="true"></i></span>
          <a href="blog.html">部落格</a>
          <span class="breadcrumb-sep"><i class="bi bi-chevron-right" aria-hidden="true"></i></span>
          <span id="breadcrumbTitle" class="yr-article-breadcrumb__current">載入中...</span>
        </nav>

        <!-- 文章 Hero 圖片 Article hero image -->
        <img
          id="articleHeroImg"
          class="article-hero-img yr-article-hero"
          src="https://picsum.photos/seed/default/1200/514"
          alt="文章封面圖"
          loading="eager"
        >

        <!-- 文章 Metadata 區塊 Article metadata block -->
        <div class="article-detail-meta yr-article-meta">
          <span class="article-detail-badge yr-article-badge" id="articleCategory">載入中</span>
          <div class="article-detail-author">
            <img id="articleAuthorAvatar" class="yr-article-author-avatar" src="https://picsum.photos/seed/default/40/40" alt="作者頭像" loading="lazy">
            <span id="articleAuthorName" class="yr-article-author-name">作者</span>
          </div>
          <span id="articleDate" class="yr-article-meta__item">日期</span>
          <span id="articleReadTime" class="yr-article-meta__item">閱讀時間</span>
        </div>

        <!-- 文章標題 Article title -->
        <h1 id="articleTitle" class="yr-article-title">
          載入中...
        </h1>

        <!-- 文章內容 Article content (rendered by JS) -->
        <div class="article-content yr-article-content" id="articleContent">
          <div class="yr-article-loading">
            <div><i class="bi bi-file-earmark-text" aria-hidden="true"></i></div>
            <p>正在載入文章內容...</p>
          </div>
        </div>

        <!-- 文章標籤 Article tags -->
        <div id="articleTags" class="yr-article-tags">
          <!-- JS 渲染標籤 -->
        </div>

        <!-- 分隔線 Divider -->
        <hr class="yr-article-divider">

        <!-- 相關文章推薦 Related articles -->
        <section id="relatedArticlesSection" class="yr-article-related">
          <h3 class="yr-article-related__title"><i class="bi bi-journal-text" aria-hidden="true"></i> 相關文章</h3>
          <div class="related-articles-grid yr-article-related__grid" id="relatedArticlesGrid">
            <!-- JS 渲染相關文章 -->
          </div>
        </section>

      </div>
    </div>
  </main>

 <div id="footer"></div>
  <!-- ===================================================
       Script 載入（同 blog.html，但換成 blog-detail.js）
       =================================================== -->
  <script src="../js/config.js" defer></script>
  <script src="../js/storage.js" defer></script>
  <script src="../js/state.js" defer></script>
  <script src="../js/formatters.js" defer></script>
  <script src="../js/validators.js" defer></script>
  <script src="../js/cart-service.js" defer></script>
  <script src="../js/api-mock.js" defer></script>
  <script src="../js/components/toast.js" defer></script>
  <script src="../js/components/modal.js" defer></script>
  <script src="../js/components/header.js" defer></script>
  <script src="../js/components/cart.js" defer></script>
  <script src="../js/pages/blog-detail.js" defer></script>
  <script src="../js/main.js" defer></script>

</body>
</html>
