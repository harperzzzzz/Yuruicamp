<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Yuruicamp 結帳頁面 - 安全快速完成購物" />
    <meta name="theme-color" content="#244d4d" />
    <title>結帳 - Yuruicamp 露營選物</title>
    <!-- 預先連線外部資源，減少 DNS 查詢延遲 / Preconnect to reduce DNS lookup latency -->
    <link rel="preconnect" href="https://picsum.photos" />
    <link rel="dns-prefetch" href="https://picsum.photos" />
    <link rel="stylesheet" href="../css/main.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏕️</text></svg>"
    />
  </head>
  <body>
    <div id="header"></div>
    <!-- ===================================================
       頁面主體 Main Content
       =================================================== -->
    <main class="container u-migrated-056">
      <!-- 頁面標題 Page Title -->
      <div class="u-migrated-025">
        <h1 class="u-migrated-057">📋 結帳</h1>
        <!-- 步驟進度條 Step progress indicator -->
        <div class="u-migrated-058">
          <span class="u-migrated-059">🛒 購物車</span>
          <span>›</span>
          <span class="u-migrated-059">📋 結帳</span>
          <span>›</span>
          <span>✅ 完成</span>
        </div>
      </div>

      <!-- ===== 兩欄佈局：左側表單 + 右側摘要 ===== -->
      <div class="checkout-layout">
        <!-- ===== 左側：結帳表單（3個手風琴面板）===== -->
        <div class="checkout-form-column">
          <!-- ========================================
             面板 1：買家資訊 Buyer Info Panel
             ======================================== -->
          <div class="checkout-panel open" id="panel-buyer">
            <div class="checkout-panel-header u-migrated-060" data-panel="buyer">
              <div class="u-migrated-061">
                <div class="u-migrated-062">1</div>
                <span class="u-migrated-063">買家資訊</span>
              </div>
              <span class="panel-arrow u-migrated-064">▼</span>
            </div>
            <div class="checkout-panel-body u-migrated-065">
              <div class="u-migrated-066">
                <div>
                  <label class="u-migrated-067"> 姓名 <span class="u-migrated-068">*</span> </label>
                  <input
                    class="u-migrated-069"
                    type="text"
                    id="buyerName"
                    name="buyerName"
                    placeholder="王小明"
                    required
                  />
                </div>
                <div>
                  <label class="u-migrated-067"> 電話 <span class="u-migrated-068">*</span> </label>
                  <input
                    class="u-migrated-069"
                    type="tel"
                    id="buyerPhone"
                    name="buyerPhone"
                    placeholder="0912-345-678"
                    pattern="^(\+886|886|0)[1-9][0-9\-\s()]{7,12}$"
                    title="請輸入台灣電話格式，例如 0912-345-678 或 +886912345678"
                    required
                  />
                </div>
              </div>
              <div class="u-migrated-030">
                <label class="u-migrated-067"> Email <span class="u-migrated-068">*</span> </label>
                <input
                  class="u-migrated-069"
                  type="email"
                  id="buyerEmail"
                  name="buyerEmail"
                  placeholder="your@email.com"
                  required
                />
              </div>
              <div class="u-migrated-070">
                <label class="u-migrated-067"> 備註（選填） </label>
                <!-- 重點：#confirmOrderBtn 會把此欄位同步為 orders.json 的 userNote。 -->
                <textarea
                  class="u-migrated-071"
                  id="buyerNote"
                  name="buyerNote"
                  placeholder="有什麼需要告知賣家的嗎？"
                  rows="2"
                ></textarea>
              </div>
              <!-- 帶入會員資料按鈕 Fill from profile button -->
              <button id="fillProfileBtn" type="button" class="btn btn-secondary u-migrated-072">
                👤 帶入會員資料
              </button>
            </div>
          </div>
          <!-- /panel-buyer -->

          <div class="u-migrated-073"></div>

          <!-- ========================================
             面板 2：物流選擇 Shipping Method Panel
             ======================================== -->
          <div class="checkout-panel" id="panel-shipping">
            <div class="checkout-panel-header u-migrated-074" data-panel="shipping">
              <div class="u-migrated-061">
                <div class="u-migrated-062">2</div>
                <span class="u-migrated-063">物流選擇</span>
              </div>
              <span class="panel-arrow u-migrated-075">▼</span>
            </div>
            <div class="checkout-panel-body u-migrated-076">
              <!-- 物流選項：宅配 -->
              <label class="radio-option u-migrated-077">
                <!-- 重點：被選取時會同步為 orders.json 的 shippingMethod = delivery。 -->
                <input
                  class="u-migrated-078"
                  type="radio"
                  name="shippingMethod"
                  value="delivery"
                  id="shippingDelivery"
                  checked
                />
                <div>
                  <div class="u-migrated-079">🚚 宅配到府</div>
                  <div class="u-migrated-080">黑貓宅急便，2-4 個工作天到達</div>
                  <div class="u-migrated-081">運費 NT$60（滿 NT$3000 免運）</div>
                </div>
              </label>

              <!-- 物流選項：門市取貨 -->
              <label class="radio-option u-migrated-082">
                <!-- 重點：被選取時會同步為 orders.json 的 shippingMethod = store，shippingAddress 預設台北門市。 -->
                <input
                  class="u-migrated-078"
                  type="radio"
                  name="shippingMethod"
                  value="store"
                  id="shippingStore"
                />
                <div>
                  <div class="u-migrated-079">🏪 門市取貨</div>
                  <div class="u-migrated-080">全台 Yuruicamp 門市，7-10 個工作天</div>
                  <div class="u-migrated-083">免運費</div>
                </div>
              </label>

              <!-- 送達地址（宅配時顯示）Delivery address (shown for delivery) -->
              <div class="u-migrated-084" id="deliveryAddressSection">
                <label class="u-migrated-067"> 送達地址 <span class="u-migrated-068">*</span> </label>
                <input
                  class="u-migrated-069"
                  type="text"
                  id="deliveryAddress"
                  name="deliveryAddress"
                  placeholder="台北市信義區信義路五段 100 號"
                />
              </div>
            </div>
          </div>
          <!-- /panel-shipping -->

          <div class="u-migrated-073"></div>

          <!-- ========================================
             面板 3：付款方式 Payment Method Panel
             ======================================== -->
          <div class="checkout-panel" id="panel-payment">
            <div class="checkout-panel-header u-migrated-074" data-panel="payment">
              <div class="u-migrated-061">
                <div class="u-migrated-062">3</div>
                <span class="u-migrated-063">付款方式</span>
              </div>
              <span class="panel-arrow u-migrated-075">▼</span>
            </div>
            <div class="checkout-panel-body u-migrated-076">
              <!-- 付款選項：信用卡 -->
              <label class="radio-option u-migrated-077">
                <!-- 重點：被選取時會同步為 orders.json 的 payment = credit-card。 -->
                <input
                  class="u-migrated-078"
                  type="radio"
                  name="paymentMethod"
                  value="credit"
                  id="payCredit"
                  checked
                />
                <div>
                  <div class="u-migrated-079">💳 信用卡付款</div>
                  <div class="u-migrated-080">支援 VISA / MasterCard / JCB，可分期</div>
                </div>
              </label>

              <!-- 付款選項：LINE Pay -->
              <label class="radio-option u-migrated-085">
                <!-- 重點：被選取時會同步為 orders.json 的 payment = line-pay。 -->
                <input
                  class="u-migrated-078"
                  type="radio"
                  name="paymentMethod"
                  value="linepay"
                  id="payLine"
                />
                <div>
                  <div class="u-migrated-079"><span class="u-migrated-086">LINE</span> Pay</div>
                  <div class="u-migrated-080">使用 LINE Pay 電子錢包付款，快速便利</div>
                </div>
              </label>

              <!-- 付款選項：貨到付款 -->
              <label class="radio-option u-migrated-082">
                <!-- 重點：被選取時會同步為 orders.json 的 payment = cod。 -->
                <input class="u-migrated-078" type="radio" name="paymentMethod" value="cod" id="payCod" />
                <div>
                  <div class="u-migrated-079">💵 貨到付款</div>
                  <div class="u-migrated-080">收到商品時以現金付款（限宅配）</div>
                </div>
              </label>

              <!-- 信用卡資訊（選擇信用卡時顯示）Credit card info (shown when credit selected) -->
              <div class="u-migrated-087" id="creditCardSection">
                <div class="u-migrated-088">信用卡資訊</div>
                <div class="u-migrated-089">
                  <label class="u-migrated-090">卡號</label>
                  <input
                    class="u-migrated-091"
                    type="text"
                    id="cardNumber"
                    placeholder="1234 5678 9012 3456"
                    maxlength="19"
                  />
                </div>
                <div class="u-migrated-092">
                  <div>
                    <label class="u-migrated-090">到期日</label>
                    <input
                      class="u-migrated-093"
                      type="text"
                      id="cardExpiry"
                      placeholder="MM / YY"
                      maxlength="7"
                    />
                  </div>
                  <div>
                    <label class="u-migrated-090">CVV</label>
                    <input class="u-migrated-093" type="text" id="cardCvv" placeholder="123" maxlength="4" />
                  </div>
                </div>
              </div>
            </div>
          </div>
          <!-- /panel-payment -->

          <!-- 重點：點擊後由 checkout.js 產生不重複 orderNumber，並依畫面商品、金額、物流、付款與備註建立訂單快照。 -->
          <div class="u-migrated-094">
            <button id="confirmOrderBtn" type="button" class="btn btn-primary btn-block u-migrated-095">
              🔒 確認結帳
            </button>
            <p class="u-migrated-096">點擊確認即表示您同意 Yuruicamp 的服務條款與隱私政策</p>
          </div>
        </div>
        <!-- /checkout-form-column -->

        <!-- ===== 右側：訂單摘要 Order Summary (Sticky) ===== -->
        <div class="checkout-summary-column">
          <div class="u-migrated-097">
            <h3 class="u-migrated-098">訂單摘要</h3>

            <!-- 商品清單 Order item list (rendered by JS) -->
            <div class="u-migrated-099" id="checkoutItemsList">
              <!-- 由 JS 動態渲染 -->
            </div>

            <!-- 折扣碼 Coupon Code -->
            <div class="u-migrated-100">
              <label class="u-migrated-101">🏷️ 折扣碼</label>
              <div class="u-migrated-102">
                <input
                  class="u-migrated-103"
                  type="text"
                  id="checkoutCouponInput"
                  list="checkoutCouponCodeOptions"
                  placeholder="輸入或選取折扣碼"
                  maxlength="20"
                />
                <!-- 重點：選項與購物車共用 data/users.json 的 coupons.code，確保兩頁可選 code 一致 -->
                <datalist id="checkoutCouponCodeOptions"></datalist>
                <button id="checkoutApplyCouponBtn" type="button" class="btn btn-secondary u-migrated-104">
                  套用
                </button>
              </div>
              <!-- 重點：成功套用的 coupon 會轉成文字顯示於此，結帳頁仍可繼續套用其他 coupon -->
              <div class="u-migrated-105" id="checkoutAppliedCouponTexts"></div>
              <div class="u-migrated-106" id="checkoutCouponMsg"></div>
            </div>

            <hr class="u-migrated-107" />

            <!-- 金額明細 Price breakdown -->
            <div class="u-migrated-108">
              <div class="u-migrated-109">
                <span class="u-migrated-110">商品小計</span>
                <span class="u-migrated-111" id="checkoutSubtotal">NT$0</span>
              </div>
              <div class="u-migrated-112" id="checkoutDiscountRow">
                <span class="u-migrated-113">🏷️ 折扣優惠</span>
                <span class="u-migrated-114" id="checkoutDiscount">-NT$0</span>
              </div>
              <div class="u-migrated-109">
                <span class="u-migrated-110">運費</span>
                <span class="u-migrated-111" id="checkoutShipping">NT$60</span>
              </div>
            </div>

            <hr class="u-migrated-115" />

            <div class="u-migrated-116">
              <span class="u-migrated-063">合計</span>
              <span class="u-migrated-117" id="checkoutTotal">NT$0</span>
            </div>

            <!-- 安全保障 Security indicators -->
            <div class="u-migrated-118">
              <p class="u-migrated-119">🔒 SSL 加密保護，安全付款</p>
              <p class="u-migrated-120">📦 7天無理由退換貨保障</p>
            </div>
          </div>
        </div>
        <!-- /checkout-summary-column -->
      </div>
      <!-- /checkout-layout -->
    </main>

    <div id="footer"></div>
    <!-- ===================================================
       Script 載入
       =================================================== -->
    <script src="../js/config.js" defer></script>
    <script src="../js/storage.js" defer></script>
    <script src="../js/state.js" defer></script>
    <script src="../js/formatters.js" defer></script>
    <script src="../js/validators.js" defer></script>
    <script src="../js/cart-service.js" defer></script>
    <script src="../js/api-mock.js" defer></script>
    <script src="../js/components/toast.js" defer></script>
    <script src="../js/components/modal.js" defer></script>
    <script src="../js/components/header.js" defer></script>
    <script src="../js/components/cart.js" defer></script>
    <script src="../js/components/coupons.js" defer></script>
    <script src="../js/pages/checkout.js" defer></script>
    <script src="../js/main.js" defer></script>
  </body>
</html>
