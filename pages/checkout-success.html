    <link rel="stylesheet" href="../css/theme/theme-layout.css" />

  <body class="yr-theme yr-success-page">
    <div id="header" data-header-context="shop"></div>

    <!-- ===================================================
       成功主體 Success Main Content
       =================================================== -->
    <main class="yr-success-shell">
      <section class="yr-success-card" aria-labelledby="successTitle">
        <div class="yr-success-celebration" aria-hidden="true"></div>
        <div class="yr-success-card__orb yr-success-card__orb--sage" aria-hidden="true"></div>
        <div class="yr-success-card__orb yr-success-card__orb--oat" aria-hidden="true"></div>

        <div class="yr-success-card__content">
          <div class="yr-success-icon" aria-hidden="true">
            <i class="bi bi-check-lg"></i>
          </div>

          <h1 id="successTitle" class="yr-success-title">訂單已收下，準備啟程</h1>

          <p class="yr-success-desc">
            謝謝你把下一段戶外時光交給 Yuruicamp。<br />
            我們會仔細整理這份裝備，準備妥當後再送往你的身邊。<br />
            訂單確認信已發送至您的信箱。
          </p>

          <div class="yr-success-order-paper">
            <div class="yr-success-order-label">訂單編號</div>
            <div id="orderNumberDisplay" class="yr-success-order-number">載入中...</div>
          </div>

          <div class="yr-success-journey" aria-label="物流流程">
            <div class="yr-success-journey__item">
              <div class="yr-success-journey__icon" aria-hidden="true">
                <i class="bi bi-box-seam"></i>
              </div>
              <div class="yr-success-journey__title">備貨中</div>
              <div class="yr-success-journey__time">1-2 工作天</div>
            </div>

            <div class="yr-success-journey__connector" aria-hidden="true"></div>

            <div class="yr-success-journey__item">
              <div class="yr-success-journey__icon" aria-hidden="true">
                <i class="bi bi-truck"></i>
              </div>
              <div class="yr-success-journey__title">配送中</div>
              <div class="yr-success-journey__time">2-4 工作天</div>
            </div>

            <div class="yr-success-journey__connector" aria-hidden="true"></div>

            <div class="yr-success-journey__item">
              <div class="yr-success-journey__icon" aria-hidden="true">
                <i class="bi bi-house-door"></i>
              </div>
              <div class="yr-success-journey__title">等您收貨</div>
              <div class="yr-success-journey__time">盡情探索吧！</div>
            </div>
          </div>

          <div class="yr-success-actions">
            <a
              href="member-center.html"
              class="btn btn-primary btn-block yr-success-btn yr-success-btn--primary"
            >
              <i class="bi bi-card-list" aria-hidden="true"></i>
              查看訂單明細
            </a>

            <a
              href="products.html"
              class="btn btn-secondary btn-block yr-success-btn yr-success-btn--secondary"
            >
              <i class="bi bi-bag" aria-hidden="true"></i>
              繼續購物
            </a>
          </div>

          <p class="yr-success-support">
            有任何問題？
            <a
              href="https://line.me/R/ti/p/@yuruicamp"
              target="_blank"
              rel="noopener noreferrer"
              class="yr-success-link"
              >LINE 客服</a
            >
            或
            <a href="mailto:support@yuruicamp.com" class="yr-success-link">support@yuruicamp.com</a>
          </p>
        </div>
      </section>
    </main>

    <div id="footer"></div>

    <!-- ===================================================
       Script 載入
       =================================================== -->
    <script src="../js/config.js" defer></script>
    <script src="../js/storage.js" defer></script>
    <script src="../js/state.js" defer></script>
    <script src="../js/formatters.js" defer></script>
    <script src="../js/validators.js" defer></script>
    <script src="../js/cart-service.js" defer></script>
    <script src="../js/api-mock.js" defer></script>
    <script src="../js/components/toast.js" defer></script>
    <script src="../js/components/modal.js" defer></script>
    <script src="../js/components/header.js" defer></script>
    <script src="../js/components/cart.js" defer></script>
    <script src="../js/main.js" defer></script>

    <!-- 成功頁面內嵌腳本 Inline script for success page -->
    <script>
      (function initSuccessPage() {
        const params = new URLSearchParams(window.location.search);
        let orderNum = params.get('orderNum');

        if (!orderNum) {
          try {
            const lastOrder = JSON.parse(localStorage.getItem('lastCheckoutOrder') || 'null');
            orderNum = lastOrder?.orderNumber || lastOrder?.id || '';
          } catch (error) {
            console.warn('讀取 lastCheckoutOrder 失敗，成功頁不自行產生訂單編號。', error);
          }
        }

        const orderNumEl = document.getElementById('orderNumberDisplay');
        if (orderNumEl) {
          const normalizedOrderNum = String(orderNum || '--').replace(/^#/, '');
          orderNumEl.textContent = normalizedOrderNum === '--' ? '#--' : `#${normalizedOrderNum}`;
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', launchGentleCelebration, { once: true });
        } else {
          launchGentleCelebration();
        }
      })();

      function launchGentleCelebration() {
        var reducedMotion =
          window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        var host = document.querySelector('.yr-success-celebration');

        if (reducedMotion || !host) return;

        var total =
          window.innerWidth < 640 ? 6 + Math.floor(Math.random() * 3) : 12 + Math.floor(Math.random() * 5);
        var palette = ['#A8B39F', '#D8C8B6', '#C8A99D', '#B9A27D'];

        for (var i = 0; i < total; i++) {
          (function (index) {
            var particle = document.createElement('span');
            particle.className = 'yr-celebration-particle';
            particle.style.left = 8 + Math.random() * 84 + '%';
            particle.style.animationDuration = (7 + Math.random() * 4).toFixed(2) + 's';
            particle.style.animationDelay = (Math.random() * 0.8).toFixed(2) + 's';
            particle.style.setProperty(
              '--yr-particle-sway-distance',
              (18 + Math.random() * 14).toFixed(0) + 'px'
            );
            particle.style.setProperty(
              '--yr-particle-sway-duration',
              (2.4 + Math.random() * 1.4).toFixed(2) + 's'
            );

            var shape = document.createElement('span');
            shape.className = 'yr-celebration-particle__shape';

            var color = palette[index % palette.length];
            var isLeaf = index % 4 === 0;
            var width = 5 + Math.round(Math.random() * 4);
            var height = 12 + Math.round(Math.random() * 10);
            var rotation = 30 + Math.round(Math.random() * 110);

            shape.style.width = width + 'px';
            shape.style.height = height + 'px';
            shape.style.background = color;
            shape.style.transform = 'rotate(' + rotation + 'deg)';
            shape.classList.toggle('is-leaf', isLeaf);

            particle.appendChild(shape);
            host.appendChild(particle);

            window.setTimeout(
              function () {
                particle.remove();
              },
              (11 + Math.random() * 2) * 1000
            );
          })(i);
        }
      }
    </script>
  </body>
</html>
