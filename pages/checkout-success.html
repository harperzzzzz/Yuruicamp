<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Yuruicamp 訂單成立成功 - 感謝您的購買！" />
    <meta name="theme-color" content="#244d4d" />
    <title>訂單成立！- Yuruicamp 露營選物</title>
    <!-- 預先連線外部資源，減少 DNS 查詢延遲 / Preconnect to reduce DNS lookup latency -->
    <link rel="preconnect" href="https://picsum.photos" />
    <link rel="dns-prefetch" href="https://picsum.photos" />
    <link rel="stylesheet" href="../css/main.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏕️</text></svg>"
    />
  </head>
  <body>
    <div id="header"></div>

    <!-- ===================================================
       成功主體 Success Main Content
       =================================================== -->
    <main class="checkoutSuccessLayout">
      <!-- 成功卡片容器 Success card container -->
      <div class="checkout-success">
        <!-- 背景裝飾圓圈 Background decoration circles -->
        <div class="rightTopCircle"></div>
        <div class="leftBottomCircle"></div>

        <!-- 大型綠色勾勾圖示 Large green check icon -->
        <div class="success-icon-wrap">
          <span class="hookIcon">✓</span>
        </div>

        <!-- 成功訊息內容 Success message content -->
        <div class="success-content">
          <!-- 大標題 Main title -->
          <h1 class="successTitle">訂單成立！🎉</h1>

          <!-- 感謝文字 Thank you text -->
          <p class="successDesc">
            感謝您在 Yuruicamp 的購物！<br />
            我們已收到您的訂單，將盡快安排出貨。<br />
            訂單確認信已發送至您的信箱。
          </p>

          <!-- 訂單編號區塊 Order number block -->
          <div class="orderNumberContainer">
            <div class="orderNumber">訂單編號</div>
            <div class="orderNumberDisplay" id="orderNumberDisplay">
              <!-- 由 JS 填入訂單編號 Filled by JS -->
              載入中...
            </div>
          </div>

          <!-- 預計出貨資訊 Expected shipping info -->
          <div class="shppingInfoContainer">
            <div class="infoBox">
              <div class="infoIcon">📦</div>
              <div class="infoText">備貨中</div>
              <div class="infoSubtext">1-2 工作天</div>
            </div>
            <div class="infoBox">
              <div class="infoIcon">🚚</div>
              <div class="infoText">配送中</div>
              <div class="infoSubtext">2-4 工作天</div>
            </div>
            <div class="infoBox">
              <div class="infoIcon">🏕️</div>
              <div class="infoText">等您收貨</div>
              <div class="infoSubtext">盡情探索吧！</div>
            </div>
          </div>

          <!-- 操作按鈕組 Action buttons group -->
          <div class="successBtnConainer">
            <!-- 查看訂單明細 View order details -->
            <a href="member-center.html" class="btn btn-primary btn-block">
              📋 查看訂單明細
            </a>

            <!-- 繼續購物 Continue shopping -->
            <a href="products.html" class="btn btn-secondary btn-block"> 🛍️ 繼續購物 </a>
          </div>

          <!-- 客服提示 Customer service hint -->
          <p class="serviceHint">
            有任何問題？
            <a class="lineService" href="https://line.me/R/ti/p/@yuruicamp" target="_blank">LINE 客服</a>
            或 <a class="emailSupport" href="mailto:support@yuruicamp.com">support@yuruicamp.com</a>
          </p>
        </div>
        <!-- /success-content -->
      </div>
      <!-- /checkout-success -->
    </main>

    <div id="footer"></div>

    <!-- ===================================================
       Script 載入
       =================================================== -->
    <script src="../js/config.js" defer></script>
    <script src="../js/storage.js" defer></script>
    <script src="../js/state.js" defer></script>
    <script src="../js/formatters.js" defer></script>
    <script src="../js/validators.js" defer></script>
    <script src="../js/cart-service.js" defer></script>
    <script src="../js/api-mock.js" defer></script>
    <script src="../js/components/toast.js" defer></script>
    <script src="../js/components/modal.js" defer></script>
    <script src="../js/components/header.js" defer></script>
    <script src="../js/components/cart.js" defer></script>
    <script src="../js/main.js" defer></script>

    <!-- 成功頁面內嵌腳本 Inline script for success page -->
    <script>
      /**
       * 成功頁面初始化
       * Success page initialization
       * 這個頁面不需要獨立的 page.js，邏輯很簡單，直接內嵌
       */
      (function initSuccessPage() {
        // ------------------------------------------
        // Step 1: 從 URL 讀取訂單編號
        // Read order number from URL query string
        // 例：checkout-success.html?orderNum=ORD-1234 → orderNum = 'ORD-1234'
        // ------------------------------------------
        const params = new URLSearchParams(window.location.search);
        let orderNum = params.get('orderNum');

        // 重點：訂單編號改由 checkout.html 的 #confirmOrderBtn 產生，成功頁只負責顯示。
        if (!orderNum) {
          try {
            const lastOrder = JSON.parse(localStorage.getItem('lastCheckoutOrder') || 'null');
            orderNum = lastOrder?.orderNumber || lastOrder?.id || '';
          } catch (error) {
            console.warn('讀取 lastCheckoutOrder 失敗，成功頁不自行產生訂單編號。', error);
          }
        }

        // 顯示訂單編號 Display order number
        const orderNumEl = document.getElementById('orderNumberDisplay');
        if (orderNumEl) {
          const normalizedOrderNum = String(orderNum || '--').replace(/^#/, '');
          orderNumEl.textContent = normalizedOrderNum === '--' ? '#--' : `#${normalizedOrderNum}`;
        }

        // ------------------------------------------
        // Step 2: 啟動彩帶動畫（慶祝！）
        // Launch confetti animation (celebrate!)
        // ------------------------------------------
        launchConfetti();

        // ------------------------------------------
        // Step 3: 初始化全局組件
        // Initialize global components
        // ------------------------------------------
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', () => {
            if (typeof window.initNavbar === 'function') window.initNavbar();
            if (typeof window.initModalListeners === 'function') window.initModalListeners();
            if (typeof window.initCartListeners === 'function') window.initCartListeners();
            if (typeof window.initPersonalizationModal === 'function') window.initPersonalizationModal();
            window._appComponentsInitialized = true;
          });
        } else {
          if (typeof window.initNavbar === 'function') window.initNavbar();
          if (typeof window.initModalListeners === 'function') window.initModalListeners();
          if (typeof window.initCartListeners === 'function') window.initCartListeners();
          if (typeof window.initPersonalizationModal === 'function') window.initPersonalizationModal();
          window._appComponentsInitialized = true;
        }
      })();

      /**
       * 彩帶動畫函數
       * Confetti animation function
       * 生成多個隨機顏色的小方塊，從頁面頂部飄落
       */
      function launchConfetti() {
        // 顏色池 Color pool
        const colors = ['#22c55e', '#244d4d', '#f59e0b', '#3b82f6', '#ec4899', '#8b5cf6', '#ef4444'];

        // 生成 50 顆彩帶 Generate 50 confetti particles
        for (let i = 0; i < 50; i++) {
          setTimeout(() => {
            const particle = document.createElement('div');
            particle.className = 'confetti-particle';

            // 隨機尺寸（6~12px）Random size
            const size = Math.random() * 6 + 6;
            // 隨機水平位置 Random horizontal position
            const left = Math.random() * 100;
            // 隨機顏色 Random color
            const color = colors[Math.floor(Math.random() * colors.length)];
            // 隨機動畫時長（2~5秒）Random duration
            const duration = Math.random() * 3 + 2;
            // 隨機形狀（方形或圓形）Random shape
            const isCircle = Math.random() > 0.5;

            particle.style.cssText = `
            left: ${left}%;
            top: -20px;
            width: ${size}px;
            height: ${size}px;
            background: ${color};
            border-radius: ${isCircle ? '50%' : '2px'};
            animation-duration: ${duration}s;
            animation-delay: ${Math.random() * 1}s;
          `;

            document.body.appendChild(particle);

            // 動畫結束後移除 DOM 元素
            // Remove element after animation ends
            setTimeout(
              () => {
                particle.remove();
              },
              (duration + 1) * 1000
            );
          }, i * 30); // 每 30ms 生成一顆，避免同時生成
        }
      }
    </script>
  </body>
</html>
