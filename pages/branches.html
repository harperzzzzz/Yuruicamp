<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Yuruicamp 實體門市與合作露營地 - 找到最近的 Yuruicamp 門市，探索優質合作露營夥伴。"
    />
    <meta name="theme-color" content="#244d4d" />
    <title>分店與合作夥伴 - Yuruicamp 露營選物</title>
    <link rel="preconnect" href="https://picsum.photos" />
    <link rel="dns-prefetch" href="https://picsum.photos" />
    <link rel="stylesheet" href="../css/main.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>Y</text></svg>"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="header"></div>

    <main class="branchesPage">
      <section class="branchesHero" aria-labelledby="branchesPageTitle">
        <div class="branchesHeroContent">
          <p class="branchesHeroEyebrow">Yuruicamp Stores</p>
          <h1 class="branchesHeroTitle" id="branchesPageTitle">實體門市與合作夥伴</h1>
          <p class="branchesHeroDescription">全台三大門市，以及精選合作露營地，讓你的戶外準備更有效率。</p>
        </div>
      </section>

      <section class="branchesLocator" aria-labelledby="branchesLocatorTitle">
        <div class="branchesLocatorLayout">
          <section class="branchesListSection" aria-labelledby="branchesLocatorTitle">
            <h2 class="branchesListTitle" id="branchesLocatorTitle">門市列表</h2>
            <div class="branchesList isLoading" id="branchList" role="listbox" aria-label="實體門市清單">
              <div class="branchesLoadingState" role="status">載入分店資料中...</div>
            </div>
          </section>

          <aside class="branchesMapSection" aria-label="門市地圖與路線規劃">
            <div class="branchesMapFrame" id="mapWrap">
              <iframe
                class="branchesMapIframe"
                id="branchMapIframe"
                src="https://maps.google.com/maps?q=台北市信義區信義路五段100號&output=embed&hl=zh-TW"
                title="門市地圖"
                loading="lazy"
                allowfullscreen
              ></iframe>
            </div>
            <div class="branchesMapActions">
              <a
                class="branchesDirectionsLink"
                id="directionsBtn"
                href="https://www.google.com/maps/search/?api=1&query=台北市信義區信義路五段100號"
                target="_blank"
                rel="noopener noreferrer"
              >
                用 Google Maps 規劃路線
              </a>
            </div>
          </aside>
        </div>
      </section>

      <section class="partnersSection" aria-labelledby="partnersTitle">
        <div class="partnersSectionHeader">
          <p class="partnersEyebrow">Camp Partners</p>
          <h2 class="partnersTitle" id="partnersTitle">合作露營地與店家</h2>
          <p class="partnersDescription">持 Yuruicamp 會員卡，前往合作夥伴可享專屬優惠。</p>
        </div>
        <div class="partnersGrid" id="partnersGrid" aria-live="polite"></div>
      </section>

      <div
        class="modal"
        id="partnerModal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="partnerModalTitle"
      >
        <div class="modalContent partnerModalContent">
          <div class="partnerModalHeader">
            <h2 class="partnerModalTitle" id="partnerModalTitle">合作店家詳情</h2>
            <button class="modalClose partnerModalClose" type="button" aria-label="關閉合作店家詳情視窗">
              <span aria-hidden="true">×</span>
            </button>
          </div>
          <div class="partnerModalBody">
            <div class="partnerModalImageWrap">
              <img class="partnerModalImage" id="partnerModalImg" src="" alt="" loading="lazy" />
            </div>
            <div class="partnerModalTags" id="partnerModalTags"></div>
            <p class="partnerModalDescription" id="partnerModalDesc"></p>
            <div class="partnerModalCoupon">
              <span class="partnerModalCouponLabel">Yuruicamp 會員專屬優惠</span>
              <span class="partnerModalCouponValue" id="partnerModalDiscount"></span>
            </div>
            <div class="partnerModalActions">
              <button class="partnerModalAction" type="button" data-action="use-partner-discount">
                使用此優惠
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="footer"></div>
    <script src="../js/config.js" defer></script>
    <script src="../js/storage.js" defer></script>
    <script src="../js/state.js" defer></script>
    <script src="../js/formatters.js" defer></script>
    <script src="../js/validators.js" defer></script>
    <script src="../js/cart-service.js" defer></script>
    <script src="../js/api-mock.js" defer></script>
    <script src="../js/components/toast.js" defer></script>
    <script src="../js/components/modal.js" defer></script>
    <script src="../js/components/header.js" defer></script>
    <script src="../js/components/cart.js" defer></script>
    <script src="../js/pages/branches.js" defer></script>
    <script src="../js/main.js" defer></script>
  </body>
</html>
