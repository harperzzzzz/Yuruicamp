<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Yuruicamp 實體門市與合作露營地 - 找到最近的 Yuruicamp 門市，探索優質合作露營夥伴。"
    />
    <meta name="theme-color" content="#244d4d" />
    <title>分店與合作夥伴 - Yuruicamp 露營選物</title>
    <!-- 預先連線外部資源，減少 DNS 查詢延遲 / Preconnect to reduce DNS lookup latency -->
    <link rel="preconnect" href="https://picsum.photos" />
    <link rel="dns-prefetch" href="https://picsum.photos" />
    <link rel="stylesheet" href="../css/main.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏕️</text></svg>"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="header"></div>

    <!-- ===================================================
       頁面頂部 Banner
       =================================================== -->
    <div class="page-banner">
      <div class="container">
        <h1 class="page-banner-title">📍 實體門市 &amp; 合作夥伴</h1>
        <p class="page-banner-sub">全台三大門市，以及精選合作露營地，讓你的戶外夢想觸手可及</p>
      </div>
    </div>

    <!-- ===================================================
       主要佈局：左側分店清單 + 右側地圖
       =================================================== -->
    <div class="container">
      <div class="branches-layout">
        <!-- 左側：分店清單（由 JS 渲染）-->
        <div>
          <h4 class="u-migrated-019">🏪 門市列表</h4>
          <div class="branch-list" id="branchList">
            <!-- JS 渲染後會填入 .branch-card -->
            <div class="u-migrated-020">
              <div class="u-migrated-021">📍</div>
              載入分店資料中...
            </div>
          </div>
        </div>

        <!-- 右側：Google Maps iframe -->
        <div class="branch-map-wrap" id="mapWrap">
          <iframe
            class="u-migrated-022"
            id="branchMapIframe"
            src="https://maps.google.com/maps?q=台北市信義區信義路五段100號&output=embed&hl=zh-TW"
            width="100%"
            height="450"
            frameborder="0"
            allowfullscreen
            title="門市地圖"
          >
          </iframe>
          <!-- 規劃路線按鈕（JS 會動態更新 href）-->
          <div class="u-migrated-023">
            <a
              id="directionsBtn"
              href="https://www.google.com/maps/search/?api=1&query=台北市信義區信義路五段100號"
              target="_blank"
              rel="noopener"
              class="btn btn-primary btn-block u-migrated-024"
            >
              🗺️ 用 Google Maps 規劃路線
            </a>
          </div>
        </div>
      </div>
      <!-- /branches-layout -->
    </div>

    <!-- ===================================================
       合作露營地 & 店家區塊（全寬）
       =================================================== -->
    <section class="partners-section">
      <div class="container">
        <div class="text-center u-migrated-025">
          <h2 class="u-migrated-026">🤝 合作露營地 &amp; 店家</h2>
          <p class="text-muted">持 Yuruicamp 會員卡，前往合作露營地享有專屬優惠</p>
        </div>
        <!-- 合作店家網格（由 JS 渲染）-->
        <div class="products-grid" id="partnersGrid">
          <!-- JS 渲染後會填入 .partner-card -->
        </div>
      </div>
    </section>

    <!-- ===================================================
       合作店家詳情 Modal (partnerModal)
       =================================================== -->
    <div id="partnerModal" class="modal" role="dialog" aria-modal="true">
      <div class="modal-content u-migrated-027">
        <div class="modal-header">
          <h5 class="modal-title" id="partnerModalTitle">合作店家詳情</h5>
          <button class="modal-close">✕</button>
        </div>
        <div class="modal-body">
          <!-- 店家圖片 -->
          <div class="u-migrated-028">
            <img
              class="u-migrated-029"
              id="partnerModalImg"
              src=""
              alt="合作店家"
              onerror="this.src = 'https://picsum.photos/seed/fallback/500/281'"
            />
          </div>
          <!-- 標籤 -->
          <div class="partner-tags u-migrated-030" id="partnerModalTags"></div>
          <!-- 描述 -->
          <p class="u-migrated-031" id="partnerModalDesc"></p>
          <!-- 優惠碼 -->
          <div class="u-migrated-032">
            <div class="u-migrated-033">🎁 Yuruicamp 會員專屬優惠</div>
            <div class="u-migrated-034" id="partnerModalDiscount"></div>
          </div>
          <!-- 按鈕 -->
          <button
            class="btn btn-primary btn-block"
            onclick="window.showToast && window.showToast('優惠已記錄！前往露營地時出示即可', 'success')"
          >
            ✅ 我要使用此優惠
          </button>
        </div>
      </div>
    </div>

    <div id="footer"></div>
    <!-- ===================================================
       Script 載入（順序很重要！）
       =================================================== -->
    <script src="../js/config.js" defer></script>
    <script src="../js/storage.js" defer></script>
    <script src="../js/state.js" defer></script>
    <script src="../js/formatters.js" defer></script>
    <script src="../js/validators.js" defer></script>
    <script src="../js/cart-service.js" defer></script>
    <script src="../js/api-mock.js" defer></script>
    <script src="../js/components/toast.js" defer></script>
    <script src="../js/components/modal.js" defer></script>
    <script src="../js/components/header.js" defer></script>
    <script src="../js/components/cart.js" defer></script>
    <script src="../js/pages/branches.js" defer></script>
    <script src="../js/main.js" defer></script>
  </body>
</html>
