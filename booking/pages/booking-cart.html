<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#73816E" />
    <link rel="icon" href="../../assets/icons/camping_icon.png" type="image/png" />
    <title>確認背包 | Yuruicamp 露營選物</title>

    <link rel="stylesheet" href="../css/booking-main.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
  </head>
  <body>
    <div id="bookingHeader" class="bookingHeaderMount"></div>

    <main class="bookingCartPage">
      <!-- 步驟進度列 -->
      <div class="bookingStepProgress">
        <div class="bookingStep isCompleted">
          <span><i class="bi bi-check-lg"></i></span>
          選擇營區
        </div>
        <div class="bookingStep isCompleted">
          <span><i class="bi bi-check-lg"></i></span>
          選擇日期
        </div>
        <div class="bookingStep isCompleted">
          <span><i class="bi bi-check-lg"></i></span>
          租借裝備
        </div>
        <div class="bookingStep isSelected">
          <span>4</span>
          確認背包
        </div>
        <div class="bookingStep">
          <span>5</span>
          確認結帳
        </div>
      </div>

      <!-- 頁面標題：共用 cartPage* 語意，booking 變體只負責預約流程差異。 -->
      <div class="cartPageHeader cartPageHeaderBooking">
        <h1 class="cartPageTitle cartPageTitleBooking"><i class="bi bi-bag-heart"></i> 我的預約背包</h1>
        <p id="bookingCartCount" class="cartCountText cartCountTextBooking"></p>
      </div>

      <!-- 空背包狀態：共用 cartEmpty* 語意，保留 booking 變體供本流程覆寫。 -->
      <div id="bookingCartEmpty" class="cartEmpty cartEmptyBooking bookingCartEmptyState">
        <div class="cartEmptyIcon cartEmptyIconBooking"><i class="bi bi-bag-x"></i></div>
        <div class="cartEmptyTitle cartEmptyTitleBooking">背包是空的</div>
        <p class="cartEmptyText cartEmptyTextBooking">還沒有選擇任何營區或裝備，去探索看看吧！</p>
        <a href="./camp-search.html" class="btn btnPrimary"> <i class="bi bi-search"></i> 探索營區 </a>
      </div>

      <!-- 有內容時的兩欄佈局：cartLayout 是功能語意，cartLayoutBooking 是 booking 專屬尺寸。 -->
      <div id="bookingCartContent" class="cartLayout cartLayoutBooking bookingCartContent">
        <!-- ══ 左側：項目列表 ══ -->
        <div>
          <!-- 住宿卡 -->
          <div class="cartCard cartCardBooking" id="bookingCartStayCard">
            <div class="cartCardHeader cartCardHeaderBooking">
              <span class="cartCardTitle cartCardTitleBooking"> <i class="bi bi-house-door"></i> 住宿 </span>
              <a href="#" id="bookingCartEditDateLink" class="cartEditLink cartEditLinkBooking">
                <i class="bi bi-pencil"></i> 修改日期
              </a>
            </div>
            <div class="cartCardBody cartCardBodyBooking" id="bookingCartStayBody">
              <!-- JS 填入 -->
            </div>
          </div>

          <!-- 裝備租借卡 -->
          <div class="cartCard cartCardBooking" id="bookingCartRentalCard">
            <div class="cartCardHeader cartCardHeaderBooking">
              <span class="cartCardTitle cartCardTitleBooking"> <i class="bi bi-bag"></i> 裝備租借 </span>
              <a href="./camp-rental.html" class="cartEditLink cartEditLinkBooking">
                <i class="bi bi-pencil"></i> 修改裝備
              </a>
            </div>
            <div class="cartCardBody cartCardBodyBooking" id="bookingCartRentalBody">
              <!-- JS 填入 -->
            </div>
          </div>

          <!-- 清除背包 -->
          <div class="cartClearAction cartClearActionBooking">
            <button id="bookingCartClearButton" class="cartClearButton cartClearButtonBooking">
              <i class="bi bi-trash3"></i> 清除背包
            </button>
          </div>
        </div>

        <!-- ══ 右側：費用摘要 ══ -->
        <div class="cartSummaryColumn cartSummaryColumnBooking">
          <div class="cartSummaryCard cartSummaryCardBooking">
            <h3>費用摘要</h3>

            <!-- 費用逐項 -->
            <div id="bookingCartCostRows" class="bookingCartCostRows"></div>

            <hr />

            <!-- 合計 -->
            <div class="costTotal">
              <span>應付總金額</span>
              <strong class="costTotalAmount" id="bookingCartFinalAmount">NT$0</strong>
            </div>

            <!-- 前往結帳 -->
            <a
              href="./booking-checkout.html"
              class="btn btnPrimary btnFull cartCheckoutButton cartCheckoutButtonBooking bookingCartCheckoutButton"
              id="bookingCartCheckoutButton"
            >
              <i class="bi bi-arrow-right-circle"></i> 前往結帳
            </a>

            <!-- 繼續修改 -->
            <a href="./camp-rental.html"> ← 返回修改裝備 </a>

            <!-- 安全保障 -->
            <div>
              <p>🔒 SSL 加密保護，安全付款</p>
              <p>📋 預約確認信將寄送至您的信箱</p>
            </div>
          </div>
        </div>
      </div>
      <!-- /cartLayoutBooking -->
    </main>

    <div id="bookingFooter"></div>

    <script src="../js/layout.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
      $(function () {
        window.loadBookingSharedLayout();
      });
    </script>
    <script src="../js/booking-utils.js"></script>
    <script src="../js/booking-cart.js"></script>
  </body>
</html>
