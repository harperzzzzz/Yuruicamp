<!-- partials/products.html
     商品與庫存管理頁面
     由 core.js 的 $.load() 注入到 #contentArea
     表格數據由 products.js 的 $.getJSON() 動態產生
-->

<div class="card shadow-sm border-0">

  <!-- 卡片頂部：標題 + 新增商品按鈕 -->
  <div class="card-header bg-white border-0
              d-flex justify-content-between align-items-center py-3">
    <div>
      <h6 class="fw-semibold mb-0">
        <i class="fas fa-box-open me-2 text-muted"></i>商品列表
      </h6>
      <!-- 低庫存警告說明 -->
      <small class="text-danger">
        <i class="fas fa-circle me-1" style="font-size: 0.5rem;"></i>
        紅色列表示庫存不足 5 件
      </small>
    </div>

    <!-- 新增商品按鈕：觸發 dashboard.html 裡的 #addProductModal -->
    <button class="btn btn-sm text-white"
            style="background-color: var(--admin-brand-accent);"
            data-bs-toggle="modal"
            data-bs-target="#addProductModal">
      <i class="fas fa-plus me-1"></i>新增商品
    </button>
  </div>

  <!-- 表格容器 -->
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover mb-0" id="productsTable">
        <thead class="table-light">
          <tr>
            <th style="width: 60px;">圖片</th>
            <th>商品名稱</th>
            <th>分類</th>
            <th>售價</th>
            <th>庫存</th>
            <th>狀態</th>
            <th>上架切換</th>
            <th>操作</th>
          </tr>
        </thead>
        <!-- tbody 由 products.js 的 renderProductsTable() 動態填入 -->
        <!-- 庫存 < 5 的列：JS 會自動加上 table-danger class（淡紅底色） -->
        <tbody id="productsTableBody">
          <tr>
            <td colspan="8" class="text-center py-4">
              <div class="spinner-border spinner-border-sm me-2"
                   style="color: var(--admin-brand-accent);"></div>
              <span class="text-muted">載入商品中...</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div><!-- end card-body -->

</div><!-- end card -->
