<!-- partials/movement.html
     庫存異動紀錄頁面
     由 core.js 的 $.load() 注入到 #contentArea
     表格數據由 movement.js 的 $.getJSON() 動態產生
     期間篩選 + 欄位排序/篩選由 movement.js 驅動
-->

<div class="card shadow-sm border-0">

  <!-- 卡片頂部：日期篩選 + 清除條件按鈕（結構對齊 orders.html） -->
  <div class="card-header bg-white border-0
              d-flex justify-content-start align-items-center flex-wrap gap-2 py-3">
    <div class="d-flex align-items-center flex-nowrap gap-2">
      <div class="btn-group btn-group-sm" id="movementPeriodBtns" role="group">
        <button type="button" class="btn btn-outline-secondary" data-days="7">近 7 天</button>
        <button type="button" class="btn btn-outline-secondary active" data-days="30">近 30 天</button>
        <button type="button" class="btn btn-outline-secondary" data-days="month">本月</button>
        <button type="button" class="btn btn-outline-secondary" data-days="90">近 3 個月</button>
        <button type="button" class="btn btn-outline-secondary" data-days="custom">
          <i class="fas fa-calendar-alt me-1"></i>自定義
        </button>
      </div>
      <input type="text" id="movementDateRangePicker"
             class="form-control form-control-sm flex-shrink-0"
             style="width: 230px; display: none; white-space: nowrap;"
             placeholder="開始日期 ~ 結束日期" readonly>
      <span class="text-muted small" id="movementPeriodLabel"></span>
    </div>
    <button id="btnClearMovementSort" class="btn btn-sm btn-outline-secondary d-none">
      <i class="fas fa-rotate-left me-1"></i>清除條件
    </button>
  </div>

  <!-- 表格容器 -->
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover mb-0" id="movementTable">
        <thead class="table-light">
          <tr>
            <th>異動編號</th>

            <!-- 異動日期：可排序（ISO 字串 YYYY-MM-DD 可直接比大小） -->
            <th class="sortable-th" data-sort-key="date">
              異動日期 <i class="fas fa-sort sort-icon ms-1"></i>
            </th>

            <!-- 負責員工 ID：多選篩選（checkbox 由 movement.js 依資料動態填入） -->
            <th class="filter-th" data-filter-key="employeeId">
              負責員工 ID
              <i class="fas fa-filter filter-icon ms-1"></i>
              <span class="filter-dot d-none"></span>
              <div class="filter-dropdown d-none">
                <!-- populateEmployeeFilterOptions() 動態填入 -->
              </div>
            </th>

            <th>明細筆數</th>

            <!-- 異動性質：多選篩選（比對 items[].type） -->
            <th class="filter-th" data-filter-key="movementType">
              異動性質
              <i class="fas fa-filter filter-icon ms-1"></i>
              <span class="filter-dot d-none"></span>
              <div class="filter-dropdown d-none">
                <label><input type="checkbox" value="進貨"> 進貨</label>
                <label><input type="checkbox" value="移轉"> 移轉</label>
                <label><input type="checkbox" value="調撥"> 調撥</label>
                <label><input type="checkbox" value="營地互轉"> 營地互轉</label>
                <label><input type="checkbox" value="損耗"> 損耗</label>
                <label><input type="checkbox" value="—"> 未分類</label>
              </div>
            </th>
          </tr>
        </thead>
        <!-- tbody 由 movement.js 的 renderMovementTable() 動態填入 -->
        <tbody id="movementTableBody">
          <tr>
            <td colspan="5" class="text-center py-4">
              <div class="spinner-border spinner-border-sm me-2"
                   style="color: var(--admin-brand-accent);"></div>
              <span class="text-muted">載入庫存異動紀錄中...</span>
            </td>
          </tr>
          <!-- colspan 需對應 thead 5 欄 -->
        </tbody>
      </table>
    </div>
  </div><!-- end card-body -->

</div><!-- end card -->

<!-- 庫存異動明細 Modal -->
<div class="modal fade" id="movementDetailModal" tabindex="-1"
     aria-labelledby="movementDetailModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="movementDetailModalLabel">
          庫存異動明細 — <span id="modalMovementId" class="text-muted"></span>
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3 mb-3">
          <div class="col-sm-6">
            <small class="text-muted d-block">異動日期</small>
            <span id="modalMovementDate" class="fw-semibold"></span>
          </div>
          <div class="col-sm-6">
            <small class="text-muted d-block">員工 ID</small>
            <span id="modalMovementEmployeeId" class="fw-semibold"></span>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-sm table-bordered mb-0">
            <thead class="table-light">
              <tr>
                <th>商品名稱</th>
                <th class="text-center">數量</th>
                <th>配送地</th>
                <th>接收地</th>
                <th>異動性質</th>
              </tr>
            </thead>
            <tbody id="modalMovementItems">
              <!-- movement.js 動態填入 -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
