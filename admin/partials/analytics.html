<!-- partials/analytics.html
     分析報表頁面
     由 core.js 的 $.load() 注入到 #contentArea
     注意：此檔案不含 <html>/<head>/<body> 標籤，只有內容區塊
-->

<!-- ===== KPI 統計卡片（三欄）===== -->
<div class="row g-4 mb-4">

  <!-- 卡片 1：今日營業額 -->
  <div class="col-md-4">
    <div class="card shadow-sm border-0">
      <div class="card-body d-flex align-items-center gap-3">
        <!-- 品牌色圓形 Icon 背景 -->
        <div class="kpi-icon-wrap"
             style="background: rgba(36, 77, 77, 0.1);">
          <i class="fas fa-dollar-sign fs-4"
             style="color: var(--admin-brand-accent);"></i>
        </div>
        <div>
          <p class="text-muted small mb-1">今日營業額</p>
          <!-- id="kpiRevenue"：由 analytics.js 填入計算結果 -->
          <h3 class="fw-bold mb-0" id="kpiRevenue">
            <!-- 初始顯示 Loading Spinner，計算完成後由 JS 替換 -->
            <span class="spinner-border spinner-border-sm text-secondary"></span>
          </h3>
          <!-- 說明文字（如：今日已完成訂單加總）-->
          <small class="text-muted" id="kpiRevenueNote">計算中...</small>
        </div>
      </div>
    </div>
  </div>

  <!-- 卡片 2：待出貨訂單 -->
  <div class="col-md-4">
    <div class="card shadow-sm border-0">
      <div class="card-body d-flex align-items-center gap-3">
        <div class="kpi-icon-wrap"
             style="background: rgba(255, 193, 7, 0.15);">
          <i class="fas fa-truck fs-4 text-warning"></i>
        </div>
        <div>
          <p class="text-muted small mb-1">待出貨訂單</p>
          <h3 class="fw-bold mb-0">
            <!-- id="kpiPending"：由 analytics.js 填入 -->
            <span id="kpiPending">
              <span class="spinner-border spinner-border-sm text-secondary"></span>
            </span>
            <span class="fs-6 text-muted"> 筆</span>
          </h3>
          <small class="text-muted">需盡快處理出貨</small>
        </div>
      </div>
    </div>
  </div>

  <!-- 卡片 3：低庫存商品 -->
  <div class="col-md-4">
    <div class="card shadow-sm border-0">
      <div class="card-body d-flex align-items-center gap-3">
        <div class="kpi-icon-wrap"
             style="background: rgba(220, 53, 69, 0.1);">
          <i class="fas fa-exclamation-triangle fs-4 text-danger"></i>
        </div>
        <div>
          <p class="text-muted small mb-1">低庫存商品</p>
          <h3 class="fw-bold mb-0">
            <!-- id="kpiLowStock"：由 analytics.js 填入 -->
            <span id="kpiLowStock">
              <span class="spinner-border spinner-border-sm text-secondary"></span>
            </span>
            <span class="fs-6 text-muted"> 件</span>
          </h3>
          <small class="text-muted">庫存量 &lt; 5 件</small>
        </div>
      </div>
    </div>
  </div>

</div><!-- end KPI 卡片 row -->

<!-- ===== 圖表區（折線圖 + 甜甜圈圖）===== -->
<div class="row g-4">

  <!-- 左側：折線圖（佔 8/12 欄）-->
  <div class="col-lg-8">
    <div class="card shadow-sm border-0">
      <div class="card-header bg-white border-0 pt-3 pb-0">
        <h6 class="fw-semibold mb-0">
          <i class="fas fa-chart-line me-2"
             style="color: var(--admin-brand-accent);"></i>
          近七日銷售額趨勢
        </h6>
      </div>
      <div class="card-body">
        <!-- Chart.js 折線圖容器，id 固定供 analytics.js 使用 -->
        <canvas id="salesLineChart" height="100"></canvas>
      </div>
    </div>
  </div>

  <!-- 右側：甜甜圈圖（佔 4/12 欄）-->
  <div class="col-lg-4">
    <div class="card shadow-sm border-0">
      <div class="card-header bg-white border-0 pt-3 pb-0">
        <h6 class="fw-semibold mb-0">
          <i class="fas fa-chart-pie me-2"
             style="color: var(--admin-brand-accent);"></i>
          商品營收佔比
        </h6>
      </div>
      <div class="card-body">
        <!-- Chart.js 甜甜圈圖容器 -->
        <canvas id="revenueDonutChart"></canvas>
      </div>
    </div>
  </div>

</div><!-- end 圖表 row -->
