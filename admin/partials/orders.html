<!-- partials/orders.html
     訂單管理頁面
     由 core.js 的 $.load() 注入到 #contentArea
     表格數據由 orders.js 的 $.getJSON() 動態產生
-->

<div class="card shadow-sm border-0">

  <!-- 卡片頂部：標題 + 篩選 Select -->
  <div class="card-header bg-white border-0
              d-flex justify-content-between align-items-center py-3">
    <h6 class="fw-semibold mb-0">
      <i class="fas fa-shopping-bag me-2 text-muted"></i>訂單列表
    </h6>

    <!-- 狀態篩選下拉選單 -->
    <!-- orders.js 監聽此 Select 的 change 事件，根據 data-order-status 屬性篩選列 -->
    <!-- value 對應 orders.json 的 orderStatus 欄位三種值 -->
    <select class="form-select form-select-sm w-auto" id="orderStatusFilter"
            style="min-width: 120px;">
      <option value="all">全部訂單</option>
      <option value="unshipped">未出貨</option>
      <option value="shipped">已出貨</option>
      <option value="returned">已退貨</option>
    </select>
  </div>

  <!-- 表格容器 -->
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover mb-0" id="ordersTable">
        <thead class="table-light">
          <tr>
            <th>訂單編號</th>
            <th>訂單日期</th>
            <th>客戶姓名</th>
            <th>總金額</th>
            <th>付款狀態</th>
            <th>訂單狀態</th>
            <th>操作</th>
          </tr>
        </thead>
        <!-- tbody 由 orders.js 的 renderOrdersTable() 動態填入 -->
        <tbody id="ordersTableBody">
          <!-- 初始顯示 Loading 提示 -->
          <tr>
            <td colspan="7" class="text-center py-4">
              <div class="spinner-border spinner-border-sm me-2"
                   style="color: var(--admin-brand-accent);"></div>
              <span class="text-muted">載入訂單中...</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div><!-- end card-body -->

</div><!-- end card -->
