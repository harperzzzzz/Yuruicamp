<!-- ========================================
     導航欄組件 (Navbar Component)
     可在所有頁面中引用或複製
     ======================================== -->

<nav class="navbar">
  <div class="container">
    <div class="navbar-content">
      <!-- Logo -->
      <div class="navbar-brand">
        <a href="/" style="text-decoration: none; color: inherit;">🎪 Yuruicamp</a>
      </div>

      <!-- 桌面版菜單 (PC) -->
      <div class="navbar-menu hidden-mobile">
        <ul class="navbar-items">
          <li><a href="/pages/home.html">首頁</a></li>
          <li><a href="/pages/products.html">商品</a></li>
          <li><a href="/pages/blog.html">部落格</a></li>
          <li><a href="/pages/branches.html">分店</a></li>
          <li><a href="/pages/faq.html">常見問題</a></li>
        </ul>
      </div>

      <!-- 右側操作按鈕 -->
      <div class="navbar-actions">
        <!-- 搜尋按鈕 -->
        <button class="navbar-search-btn" title="搜尋" style="background: none; border: none; font-size: 1.25rem; cursor: pointer;">🔍</button>

        <!-- 購物車 Icon + Badge -->
        <a href="/pages/cart.html" class="navbar-cart-btn" title="購物車">
          🛒
          <span class="cart-badge">0</span>
        </a>

        <!-- 登入按鈕（登入前） -->
        <button class="navbar-login-btn" onclick="window.openModal('loginModal')" title="登入或註冊">登入</button>

        <!-- 用戶菜單（登入後，預設隱藏） -->
        <div class="navbar-user-menu" style="display: none; align-items: center; gap: 1rem;">
          <span class="user-name" style="font-weight: 600; color: #333;">用戶</span>
          <button onclick="window.openModal('userMenuModal')" style="background: none; border: none; font-size: 1.25rem; cursor: pointer;">⚙️</button>
        </div>

        <!-- 漢堡菜單（手機版） -->
        <button class="navbar-hamburger hidden-desktop" title="菜單" style="color: #333;">☰</button>
      </div>
    </div>
  </div>
</nav>
