<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Yuruicamp 確認購物背包 - 確認商品與暫時保留庫存" />
    <meta name="theme-color" content="#244d4d" />
    <title>確認背包 - Yuruicamp 露營選物</title>
    <link rel="stylesheet" href="/storefront/css/main.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="icon" href="/assets/icons/camping_icon.png" type="image/png" />
  </head>
  <body>
    <div id="header"></div>

    <main class="container storefrontCartPage">
      <header class="storefrontCartHeader">
        <div class="storefrontCartHeading">
          <p class="storefrontCartEyebrow">Your camping pack</p>
          <h1 class="storefrontCartTitle"><i class="bi bi-bag-heart" aria-hidden="true"></i> 確認購物背包</h1>
          <p class="storefrontCartLead">確認商品規格與數量後，我們會先為你保留庫存。</p>
        </div>
        <nav class="checkoutSteps storefrontCartStepProgress" aria-label="結帳流程">
          <ol class="storefrontCartStepList">
            <li class="storefrontCartStep isSelected" aria-current="step">
              <span>1</span>
              確認背包
            </li>
            <li class="storefrontCartStep">
              <span>2</span>
              填寫資料
            </li>
            <li class="storefrontCartStep">
              <span>3</span>
              完成
            </li>
          </ol>
        </nav>
      </header>

      <section id="storefrontCartEmpty" class="storefrontCartEmpty" hidden>
        <div class="storefrontCartEmptyIcon" aria-hidden="true"><i class="bi bi-bag-x"></i></div>
        <h2>購物背包目前是空的</h2>
        <p>先挑選適合下一趟露營的裝備，再回來一起確認。</p>
        <a class="btn btnPrimary" href="./products.html">前往挑選商品</a>
      </section>

      <div id="storefrontCartContent" class="storefrontCartLayout" hidden>
        <section class="storefrontCartItemsCard" aria-labelledby="storefrontCartItemsTitle">
          <div class="storefrontCartCardHeader">
            <div>
              <h2 id="storefrontCartItemsTitle">背包內容</h2>
              <p id="storefrontCartItemCount">共 0 件商品</p>
            </div>
            <button id="storefrontCartClearBtn" class="storefrontCartClearBtn" type="button">
              <i class="bi bi-trash3" aria-hidden="true"></i> 清空背包
            </button>
          </div>
          <div id="storefrontCartItems" class="storefrontCartItems"></div>
        </section>

        <aside class="storefrontCartSummaryCard" aria-labelledby="storefrontCartSummaryTitle">
          <h2 id="storefrontCartSummaryTitle">費用摘要</h2>
          <div class="storefrontCartSummaryRow">
            <span>商品小計</span>
            <strong id="storefrontCartSubtotal">NT$0</strong>
          </div>
          <div class="storefrontCartSummaryRow">
            <span>預估運費</span>
            <span id="storefrontCartShipping">NT$0</span>
          </div>
          <div class="storefrontCartSummaryTotal">
            <span>預估合計</span>
            <strong id="storefrontCartTotal">NT$0</strong>
          </div>

          <section
            id="storefrontCartSessionStatus"
            class="storefrontCartSessionStatus"
            role="status"
            aria-live="polite"
          >
            <i class="bi bi-hourglass-split" id="storefrontCartSessionIcon" aria-hidden="true"></i>
            <div>
              <strong id="storefrontCartSessionTitle">正在確認商品庫存</strong>
              <p id="storefrontCartSessionMessage">請稍候，我們正在建立 Checkout Session。</p>
              <ul id="storefrontCartSessionDetails" hidden></ul>
            </div>
          </section>

          <a
            id="storefrontCartCheckoutLink"
            class="btn btnPrimary storefrontCartCheckoutLink"
            href="./checkout.html"
            aria-disabled="true"
          >
            <i class="bi bi-hourglass-split" aria-hidden="true"></i> 正在確認庫存
          </a>
          <a class="storefrontCartContinueLink" href="./products.html">
            <i class="bi bi-arrow-left" aria-hidden="true"></i> 繼續選購
          </a>

          <div class="storefrontCartTrust">
            <p><i class="bi bi-shield-lock" aria-hidden="true"></i> SSL 加密保護</p>
            <p><i class="bi bi-clock-history" aria-hidden="true"></i> 庫存保留 15 分鐘</p>
          </div>
        </aside>
      </div>
    </main>

    <div id="footer"></div>

    <script src="/storefront/js/config.js" defer></script>
    <script src="/storefront/js/api-client.js" defer></script>
    <script src="/storefront/js/storage.js" defer></script>
    <script src="/storefront/js/state.js" defer></script>
    <script src="/storefront/js/formatters.js" defer></script>
    <script src="/storefront/js/validators.js" defer></script>
    <script src="/storefront/js/cart-service.js" defer></script>
    <script src="/storefront/js/api-mock.js" defer></script>
    <script src="/storefront/js/components/toast.js" defer></script>
    <script src="/storefront/js/components/modal.js" defer></script>
    <script src="/storefront/js/components/header.js" defer></script>
    <script src="/storefront/js/components/cart.js" defer></script>
    <script src="/storefront/js/pages/cart.js" defer></script>
    <script src="/storefront/js/main.js" defer></script>
  </body>
</html>
