<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Yuruicamp 會員中心 - 管理會員資料、訂單紀錄與露營預約" />
    <meta name="theme-color" content="#244d4d" />
    <title>會員中心 - Yuruicamp 露營選物</title>
    <link rel="preconnect" href="https://picsum.photos" />
    <link rel="dns-prefetch" href="https://picsum.photos" />
    <link rel="stylesheet" href="/storefront/css/main.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="icon" href="/assets/icons/camping_icon.png" type="image/png" />
  </head>
  <body>
    <div id="header"></div>
    <div id="memberCenterMount" data-component-mount="member-center"></div>
    <div id="footer"></div>
    <script>
      function resolveMainMemberReturnHref() {
        const params = new URLSearchParams(window.location.search);
        const returnTo = params.get('returnTo');
        const fallback = 'home.html';
        if (!returnTo) return fallback;
        try {
          const target = new URL(returnTo, window.location.href);
          const allowedPrefix = new URL('./', window.location.href).pathname;
          const isMainPage = target.origin === window.location.origin && target.pathname.startsWith(allowedPrefix);
          const isCurrentPage = target.pathname.endsWith('/pages/member-center.html');
          return isMainPage && !isCurrentPage ? target.pathname.split('/pages/').pop() + target.search + target.hash : fallback;
        } catch (error) { return fallback; }
      }
      window.MemberCenterConfig = { dataBasePath: '/data', authStorageKey: 'currentUser', fallbackAuthStorageKey: 'yuruiUser', homeHref: resolveMainMemberReturnHref() };
      window.loadMemberCenterComponent = async function () {
        const mount = document.getElementById('memberCenterMount');
        if (!mount) return;
        try {
          const [partialRes, modalRes] = await Promise.all([
            fetch('/components/member-center.partial', { cache: 'no-store' }),
            fetch('/components/shipping-address-modal.partial', { cache: 'no-store' }),
          ]);
          if (!partialRes.ok) throw new Error('HTTP ' + partialRes.status);
          mount.innerHTML = await partialRes.text();
          if (modalRes.ok) {
            const modalHost = document.createElement('div');
            modalHost.innerHTML = await modalRes.text();
            document.body.appendChild(modalHost);
            window.YuruiShippingAddressUI?.bindModal?.();
          }
          window.initMemberCenterComponent && window.initMemberCenterComponent();
        } catch (error) {
          console.error('會員中心元件載入失敗', error);
          mount.innerHTML = '<div class="memberLoginGuard isOpen" role="status" aria-live="polite"><div class="memberLoginGuardCard"><h2 class="memberLoginGuardTitle">會員中心載入失敗</h2><p class="memberLoginGuardText">請確認目前頁面透過本機伺服器開啟。</p></div></div>';
        }
      };
      document.addEventListener('DOMContentLoaded', window.loadMemberCenterComponent);
    </script>
    <script src="/storefront/js/config.js" defer></script>
    <script src="/storefront/js/storage.js" defer></script>
    <script src="/storefront/js/state.js" defer></script>
    <script src="/storefront/js/formatters.js" defer></script>
    <script src="/storefront/js/shipping-address.js" defer></script>
    <script src="/storefront/js/booking-api.js" defer></script>
    <script src="/storefront/js/validators.js" defer></script>
    <script src="/storefront/js/cart-service.js" defer></script>
    <script src="/storefront/js/api-mock.js" defer></script>
    <script src="/storefront/js/components/toast.js" defer></script>
    <script src="/storefront/js/components/modal.js" defer></script>
    <script src="/storefront/js/components/cart.js" defer></script>
    <script src="/storefront/js/components/shipping-address-ui.js" defer></script>
    <script src="/storefront/js/components/member-center.js" defer></script>
    <script src="/storefront/js/main.js" defer></script>
  </body>
</html>
