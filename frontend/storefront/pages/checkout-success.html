<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Yuruicamp 訂單成立成功，查看訂單編號與後續出貨流程。" />
    <meta name="theme-color" content="#244d4d" />
    <title>訂單成立 - Yuruicamp 露營選物</title>
    <link rel="preconnect" href="https://picsum.photos" />
    <link rel="dns-prefetch" href="https://picsum.photos" />
    <link rel="stylesheet" href="/storefront/css/main.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏕️</text></svg>" />
  </head>
  <body>
    <div id="header"></div>
    <main class="checkoutSuccessPage">
      <section class="checkoutSuccess" aria-labelledby="successTitle">
        <div class="checkoutSuccessDecoration checkoutSuccessDecorationTop" aria-hidden="true"></div>
        <div class="checkoutSuccessDecoration checkoutSuccessDecorationBottom" aria-hidden="true"></div>
        <div class="successIconWrap" aria-hidden="true"><span class="successIcon">✓</span></div>
        <div class="successContent">
          <h1 class="successTitle" id="successTitle">訂單成立</h1>
          <p class="successDescription">感謝您在 Yuruicamp 選購露營用品。我們已收到訂單，將盡快安排備貨與出貨。</p>
          <dl class="orderNumberPanel">
            <dt class="orderNumberLabel">訂單編號</dt>
            <dd class="orderNumberValue isLoading" id="orderNumberDisplay" aria-live="polite">載入中...</dd>
          </dl>
          <div class="successActions">
            <a class="successAction successActionPrimary" href="member-center.html">查看訂單明細</a>
            <a class="successAction successActionSecondary" href="products.html">繼續購物</a>
          </div>
        </div>
      </section>
    </main>
    <div id="footer"></div>
    <script src="/storefront/js/config.js" defer></script>
    <script src="/storefront/js/api-client.js" defer></script>
    <script src="/storefront/js/storage.js" defer></script>
    <script src="/storefront/js/state.js" defer></script>
    <script src="/storefront/js/formatters.js" defer></script>
    <script src="/storefront/js/validators.js" defer></script>
    <script src="/storefront/js/cart-service.js" defer></script>
    <script src="/storefront/js/api-mock.js" defer></script>
    <script src="/storefront/js/components/toast.js" defer></script>
    <script src="/storefront/js/components/modal.js" defer></script>
    <script src="/storefront/js/components/header.js" defer></script>
    <script src="/storefront/js/components/cart.js" defer></script>
    <script src="/storefront/js/components/success-effects.js" defer></script>
    <script src="/storefront/js/main.js" defer></script>
    <script>
      document.addEventListener('DOMContentLoaded', function initSuccessPage() {
        window.initNavbar?.();
        window.initModalListeners?.();
        window.initCartListeners?.();

        const params = new URLSearchParams(window.location.search);
        const merchantTradeNo = params.get('merchantTradeNo');
        if (merchantTradeNo) {
          pollPaymentStatus(merchantTradeNo);
          return;
        }
        renderLegacyOrderNumber();
      });

      function renderLegacyOrderNumber() {
        const orderNumberDisplay = document.getElementById('orderNumberDisplay');
        const orderNum = readOrderNumber();
        if (!orderNumberDisplay) return;
        const normalizedOrderNum = String(orderNum || '--').replace(/^#/, '');
        orderNumberDisplay.textContent = normalizedOrderNum === '--' ? '#--' : '#' + normalizedOrderNum;
        orderNumberDisplay.classList.remove('isLoading');
      }

      async function pollPaymentStatus(merchantTradeNo) {
        const orderNumberDisplay = document.getElementById('orderNumberDisplay');
        const title = document.getElementById('successTitle');
        const description = document.querySelector('.successDescription');
        const startedAt = Date.now();
        const timeoutMs = 180000;

        renderPaymentState('pending', { merchantTradeNo });
        const timer = window.setInterval(async function () {
          try {
            const status = await window.API.payments.getStatus(merchantTradeNo);
            renderPaymentState(status.transactionStatus, status);
            if (status.transactionStatus === 'paid' || status.transactionStatus === 'failed') {
              window.clearInterval(timer);
            }
          } catch (error) {
            console.error('Payment status polling failed', error);
            renderPaymentState('failed', { merchantTradeNo });
            window.clearInterval(timer);
          }
          if (Date.now() - startedAt > timeoutMs) {
            renderPaymentState('timeout', { merchantTradeNo });
            window.clearInterval(timer);
          }
        }, 1000);

        function renderPaymentState(state, status) {
          if (orderNumberDisplay) {
            orderNumberDisplay.textContent = status?.orderId ? '#' + status.orderId : merchantTradeNo;
            orderNumberDisplay.classList.remove('isLoading');
          }
          if (state === 'paid') {
            if (title) title.textContent = '付款成功';
            if (description) description.textContent = '已收到付款完成通知，訂單付款狀態已更新。';
          } else if (state === 'failed') {
            if (title) title.textContent = '付款失敗';
            if (description) description.textContent = '付款未完成或狀態查詢失敗，請稍後至會員中心確認訂單。';
          } else if (state === 'timeout') {
            if (title) title.textContent = '付款結果確認中';
            if (description) description.textContent = '尚未收到付款完成通知，請稍後至會員中心確認訂單。';
          } else {
            if (title) title.textContent = '付款結果確認中';
            if (description) description.textContent = '正在向後端確認綠界付款狀態，請稍候。';
          }
        }
      }

      function readOrderNumber() {
        const params = new URLSearchParams(window.location.search);
        const queryOrderNum = params.get('orderNum');
        if (queryOrderNum) return queryOrderNum;
        try {
          const lastSession = JSON.parse(sessionStorage.getItem('lastCheckoutSession') || 'null');
          if (!lastSession) return '';
          const orderId = lastSession.orderId;
          return window.formatOrderDisplayId ? window.formatOrderDisplayId(orderId) : String(orderId || '');
        } catch (error) { return ''; }
      }
    </script>
  </body>
</html>
