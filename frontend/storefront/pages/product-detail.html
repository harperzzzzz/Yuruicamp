<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Yuruicamp 露營選物品牌 - 商品詳情頁" />
    <meta name="theme-color" content="#244d4d" />
    <title>商品詳情 - Yuruicamp 露營選物</title>
    <!-- 預先連線外部資源，減少 DNS 查詢延遲 / Preconnect to reduce DNS lookup latency -->
    <link rel="preconnect" href="https://picsum.photos" />
    <link rel="dns-prefetch" href="https://picsum.photos" />
    <link rel="stylesheet" href="/storefront/css/main.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏕️</text></svg>"
    />
  </head>
  <body>
    <div id="header"></div>
    <!-- ===================================================
       麵包屑導覽 Breadcrumb
       =================================================== -->
    <section class="productDetailHero" aria-label="商品詳情導覽">
      <div class="container productDetailHeroInner">
        <nav class="detailBreadcrumb" aria-label="麵包屑導覽">
          <ol class="detailBreadcrumbList">
            <li class="detailBreadcrumbItem">
              <a class="detailBreadcrumbLink" href="home.html">首頁</a>
            </li>
            <li class="detailBreadcrumbItem">
              <a class="detailBreadcrumbLink" href="products.html">商品</a>
            </li>
            <li class="detailBreadcrumbItem" aria-current="page">
              <span id="breadcrumbProductName">商品詳情</span>
            </li>
          </ol>
        </nav>
        <div class="productDetailHeroText">
          <p class="productDetailHeroEyebrow">Yuruicamp Gear</p>
          <p class="productDetailHeroLead">查看裝備細節、規格與評價，確認最適合下一趟露營的配置。</p>
        </div>
      </div>
    </section>

    <!-- ===================================================
       商品詳情主體 Product Detail Main
       =================================================== -->
    <main class="container productDetailContainer">
      <!-- 載入中狀態 Loading State -->
      <div class="productLoading" id="productLoading" role="status">
        <div class="loadingIcon" aria-hidden="true"></div>
        <p class="productLoadingText">商品資料載入中...</p>
      </div>

      <!-- 載入失敗狀態 Error State -->
      <div class="productError" id="productError" hidden>
        <h3 class="errorText">找不到此商品</h3>
        <p class="errorSubText">請確認商品連結是否正確</p>
        <a href="products.html" class="btn btnPrimary">回到商品列表</a>
      </div>

      <!-- 商品詳情內容 Product Detail Content（由 JS 動態顯示）-->
      <div class="productDetailContent" id="productDetailContent" hidden>
        <!-- 商品主佈局：左圖 + 右資訊 -->
        <div class="productDetailLayout">
          <!-- ===== 左側：圖片 Gallery（Swiper 切圖 + GLightbox 放大）===== -->
          <div class="productGallery" id="productGallery">
            <!-- 主圖輪播由 JS 填入 / Main slider filled by JS -->
            <div class="galleryMain" id="galleryMain"></div>
            <!-- 縮圖列表 Thumbnail List -->
            <div class="galleryThumbs" id="galleryThumbs">
              <!-- 由 JS 動態渲染縮圖 -->
            </div>
          </div>

          <!-- ===== 右側：商品資訊 ===== -->
          <div class="productInfo">
            <!-- 品牌名稱 Brand -->
            <div id="productBrand" class="productBrand">
              <!-- 由 JS 填入 -->
            </div>

            <!-- 商品名稱 Product Name -->
            <h1 class="productName" id="productName">
              <!-- 由 JS 填入 -->
            </h1>

            <!-- 評分區域 Rating Section -->
            <div class="ratingContainer1">
              <div class="rating" id="productStars">
                <!-- 由 JS 填入星星 -->
              </div>
              <span class="reviewPoint" id="productRatingNum">4.5</span>
              <span class="reviewNumber" id="productReviewCount">（0 則評價）</span>
            </div>

            <!-- 價格區域 Price Section -->
            <div class="priceSection">
              <div class="priceBox">
                <span class="currentPrice" id="productPrice">
                  <!-- 現價 -->
                </span>
                <span class="productOriginalPrice" id="productOriginalPrice">
                  <!-- 原價 -->
                </span>
                <span class="productDiscount" id="productDiscount">
                  <!-- 折扣 % -->
                </span>
              </div>
            </div>

            <!-- 規格選擇：顏色 Color Spec -->
            <fieldset class="specGroup" id="colorSpecGroup">
              <legend class="specLabel">
                顏色：<span class="selectedSpecLabel" id="selectedColorLabel"></span>
              </legend>
              <div class="specOptions" id="colorOptions">
                <!-- 由 JS 動態渲染顏色按鈕 -->
              </div>
            </fieldset>

            <!-- 規格選擇：尺寸 Size Spec -->
            <fieldset class="specGroup" id="sizeSpecGroup">
              <legend class="specLabel">
                尺寸：<span class="selectedSpecLabel" id="selectedSizeLabel"></span>
              </legend>
              <div class="specOptions" id="sizeOptions">
                <!-- 由 JS 動態渲染尺寸按鈕 -->
              </div>
            </fieldset>

            <!-- 數量選擇 Quantity Stepper -->
            <div class="quantityContainer">
              <div>數量：</div>
              <div class="qtyStepper">
                <button class="qtyBtn" id="qtyDecrease" type="button" title="減少數量">−</button>
                <input class="qtyInput" id="qtyInput" type="number" value="1" min="1" max="99" readonly />
                <button class="qtyBtn" id="qtyIncrease" type="button" title="增加數量">+</button>
              </div>
            </div>

            <!-- 免運進度條 Free Shipping Progress Bar -->
            <div class="progressContainer">
              <div class="progressBox">
                <span class="progressIcon">免運進度</span>
                <span class="shippingProgressText" id="shippingProgressText"></span>
              </div>
              <progress
                class="shippingProgressBar"
                id="shippingProgressBar"
                max="100"
                value="0"
                aria-label="免運進度"
              ></progress>
              <p class="shippingProgressHint" id="shippingProgressHint"></p>
            </div>

            <!-- 操作按鈕 Action Buttons -->
            <div class="actionBtnContainer">
              <button id="addToCartBtn" class="btn btnPrimary cartBtn" type="button">
                加入購物車
              </button>
              <button id="buyNowBtn" class="btn btnSecondary cartBtn" type="button">
                直接購買
              </button>
            </div>

            <!-- 商品標籤 Tags -->
            <div class="productTags" id="productTags">
              <!-- 由 JS 動態渲染標籤 -->
            </div>
          </div>
          <!-- /productInfo -->
        </div>
        <!-- /productDetailLayout -->

        <!-- ===================================================
           下方 Tab 頁籤區域 Product Tabs
           =================================================== -->
        <div class="bottomAreaContainer">
          <!-- Tab 導航列 Tab Nav -->
          <div class="productTabsNav">
            <button class="productTabBtn isSelected" data-tab="description" type="button">
              商品介紹
            </button>
            <button class="productTabBtn" data-tab="reviews" type="button">
              商品評價 (<span id="productReviewsTabCount">0</span>)
            </button>
          </div>

          <!-- Tab 面板：商品介紹 Description Panel -->
          <div class="productTabPanel isSelected" data-panel="description">
            <div class="descriptionContainer">
              <!-- 左：商品描述 -->
              <div>
                <h3 class="productDescriptionTitle">商品說明</h3>
                <div class="productDescription productDescriptionRich" id="productDescription"></div>
                <!-- 商品特色列表 -->
                <div class="productFeatures" id="productFeatures"></div>
              </div>
              <!-- 右：商品規格表 -->
              <div>
                <h3 class="descriptionProductTitle">詳細規格</h3>
                <div class="productSpecTable" id="productSpecTable">
                  <!-- 由 JS 動態渲染規格表 -->
                </div>
              </div>
            </div>
          </div>

          <!-- Tab 面板：商品評價 Reviews Panel -->
          <div class="productTabPanel" data-panel="reviews">
            <div class="ratingContainer2" id="productReviewsList">
              <!-- 評價由 JS 透過 API.products.getReviews 動態載入 -->
            </div>
          </div>
          <!-- /reviews panel -->
        </div>
        <!-- /tabs area -->
      </div>
      <!-- /productDetailContent -->
    </main>

    <div id="footer"></div>

    <!-- ===================================================
       Script 載入（依序載入，確保依賴正確）
       =================================================== -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
    <script src="/storefront/js/config.js" defer></script>
    <script src="/storefront/js/api-client.js" defer></script>
    <script src="/storefront/js/storage.js" defer></script>
    <script src="/storefront/js/state.js" defer></script>
    <script src="/storefront/js/formatters.js" defer></script>
    <script src="/storefront/js/validators.js" defer></script>
    <script src="/storefront/js/cart-service.js" defer></script>
    <script src="/storefront/js/api-mock.js" defer></script>
    <script src="/storefront/js/components/toast.js" defer></script>
    <script src="/storefront/js/components/modal.js" defer></script>
    <script src="/storefront/js/components/header.js" defer></script>
    <script src="/storefront/js/components/cart.js" defer></script>
    <script src="/storefront/js/components/card-gallery.js" defer></script>
    <script src="/storefront/js/pages/product-detail.js" defer></script>
    <script src="/storefront/js/main.js" defer></script>
  </body>
</html>
