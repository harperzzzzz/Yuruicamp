    <title>?ѓе“Ұдё­е? | Yuruicamp ?ђз?зі»зµ±</title>

  <body>
    <div id="bookingHeader" class="bookingHeaderMount"></div>

    <!-- ?±з”ЁпәљconfigпәЏapi-clientпәЏformattersпәЏapi-mockпәЏbooking-apiпә€и? booking/partials/booking-core-scripts.partialпә?-->
    <script src="/booking/js/booking-core-scripts.js"></script>
    <script>
      // ?ЁйЂ”п??ђе€¶ booking ?ѓе“Ұдё­е?иү”е?????ҒиѓҢ?һе€°?ђз?зі»зµ±?§з??ёе??ЃйқұпәЊйЃү?Қд»»?Џе??Ёи·іиҢ‰гЂ?
      function resolveBookingMemberReturnHref() {
        const params = new URLSearchParams(window.location.search);
        const returnTo = params.get('returnTo');
        const fallback = './camp-search.html';

        if (!returnTo) return fallback;

        try {
          const target = new URL(returnTo, window.location.href);
          const allowedPrefix = new URL('../', window.location.href).pathname;
          const isBookingPage =
            target.origin === window.location.origin && target.pathname.startsWith(allowedPrefix);
          const isCurrentPage = target.pathname.endsWith('/booking/pages/member-center.html');

          return isBookingPage && !isCurrentPage
            ? target.pathname.split('/booking/pages/').pop() + target.search + target.hash
            : fallback;
        } catch (error) {
          return fallback;
        }
      }

      // ?ЁйЂ”п?иЁ­е? booking ?ѓе“Ұдё­е??±з”Ё?ѓд»¶иі‡ж?дң†ж??‡и??һй?пәЊи??Ѓйқұе¤–ж®әдҢүз”Ё booking header/footer??
      window.MemberCenterConfig = {
        dataBasePath: '/data',
        authStorageKey: 'yuruiUser',
        fallbackAuthStorageKey: 'currentUser',
        homeHref: resolveBookingMemberReturnHref(),
      };

      // ?ЁйЂ”п?иә‰е…Ө?±з”Ё?ѓе“Ұдё­е? partialпәЊд??™е–®дёЂ HTML ?§е®№дң†ж?дё¦е???booking ?Ѓйқұе¤–ж®ә??
      window.loadBookingMemberCenterComponent = async function () {
        const mount = document.getElementById('memberCenterMount');
        if (!mount) return;

        try {
          const [partialRes, modalRes] = await Promise.all([
            fetch('/components/member-center.partial', { cache: 'no-store' }),
            fetch('/components/shipping-address-modal.partial', { cache: 'no-store' }),
          ]);
          if (!partialRes.ok) throw new Error('HTTP ' + partialRes.status);
          mount.innerHTML = await partialRes.text();
          if (modalRes.ok) {
            const modalHost = document.createElement('div');
            modalHost.innerHTML = await modalRes.text();
            document.body.appendChild(modalHost);
            window.YuruiShippingAddressUI?.bindModal?.();
          }
          window.initMemberCenterComponent && window.initMemberCenterComponent();
        } catch (error) {
          console.error('booking ?ѓе“Ұдё­е??ѓд»¶иә‰е…Өе¤±ж?', error);
          mount.innerHTML =
            '<div class="memberLoginGuard isOpen" role="status" aria-live="polite"><div class="memberLoginGuardCard"><h2 class="memberLoginGuardTitle">?ѓе“Ұдё­е?иә‰е…Өе¤±ж?</h2><p class="memberLoginGuardText">и«‹зұғиҒҚз›®?Қй??ұйЂЏй??¬ж?дәғж??Ёй??џгЂ?/p></div></div>';
        }
      };

      // ?ЁйЂ”п?booking layout ?‡ж??Ұдё­еү?partial ?„и‡Ғиә‰е…ӨпәЊи? header/footer ?‡е…§е®№йѓҢ?Ңе?е§‹е???
      document.addEventListener('DOMContentLoaded', function () {
        window.loadBookingSharedLayout && window.loadBookingSharedLayout();
        window.loadBookingMemberCenterComponent();
      });
    </script>
    <script src="/storefront/js/storage.js"></script>

    <script src="/storefront/js/shipping-address.js"></script>
    <script src="/storefront/js/validators.js"></script>
    <script src="/storefront/js/cart-service.js"></script>
    <script src="/storefront/js/components/toast.js"></script>
    <script src="/storefront/js/components/shipping-address-ui.js"></script>
    <script src="/storefront/js/components/member-center.js"></script>
  </body>
