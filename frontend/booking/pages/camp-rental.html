<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#73816E" />
    <link rel="icon" href="/assets/icons/camping_icon.png" type="image/png" />
    <title>選擇租借裝備 | Yuruicamp 露營選物</title>

    <link rel="stylesheet" href="/booking/css/booking-main.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
  </head>
  <body>
    <!-- 預約系統專屬 Header / Booking header -->
    <div id="bookingHeader" class="bookingHeaderMount"></div>

    <main class="rentalPage rentalPageBooking">
      <!-- =====================================================
         頂部預約摘要列 / Booking Summary Bar
         顯示從上一頁帶來的營區 + 日期資訊
         Displays camp + date info from previous page
         ===================================================== -->
      <div class="summaryBar summaryBarBooking" id="bookingSummaryBar">
        <i class="bi bi-info-circle"></i>
        <span id="summaryText">載入預約資訊中...</span>
        <a href="./camp-detail.html" class="summaryEditLink summaryEditLinkBooking" id="summaryEditLink">
          修改
        </a>
      </div>

      <!-- =====================================================
         情境推薦橫幅 / Context Recommendation Banner
         依據營區環境特性動態顯示，告知使用者此營地的推薦裝備
         Dynamically shown based on campground's environment tags
         ===================================================== -->
      <div class="recommendationBanner recommendationBannerBooking" id="recommendationBanner"></div>

      <!-- =====================================================
         主內容：裝備列表 + 右側已選清單
         Main: Equipment List + Right: Selected Rentals
         ===================================================== -->
      <div class="rentalLayout rentalLayoutBooking">
        <!-- 左側：可租借裝備 / Left: Available Equipment -->
        <section class="rentalItemsList rentalItemsListBooking">
          <h2 class="rentalItemsTitle rentalItemsTitleBooking">
            <i class="bi bi-bag-check"></i>
            可租借裝備
            <span id="rentalCount" class="rentalCountBooking"></span>
          </h2>

          <!-- 裝備卡片 Grid（由 JS 動態填入）-->
          <div class="rentalGrid rentalGridBooking" id="rentalGrid">
            <div class="loadingSkeleton"><i class="bi bi-hourglass-split"></i> 載入裝備中...</div>
          </div>
        </section>

        <!-- 右側：已選清單 + 費用 / Right: Cart + Cost -->
        <aside class="rentalCartSidebar rentalCartSidebarBooking">
          <h3 class="rentalCartTitle rentalCartTitleBooking"><i class="bi bi-cart3"></i> 已選裝備</h3>

          <!-- 已選裝備清單 / Selected rental list -->
          <div class="rentalCartList rentalCartListBooking" id="rentalCartList">
            <!-- 租借背包空狀態使用 base + Booking variant，讓結構語意與頁面視覺分離。 -->
            <p class="rentalCartEmpty rentalCartEmptyBooking">尚未選擇任何裝備</p>
          </div>

          <!-- 裝備費小計 / Rental subtotal -->
          <div class="rentalCostSummary rentalCostSummaryBooking">
            裝備費小計：<span id="rentalSubtotal">NT$0</span>
          </div>

          <!-- 前往結帳 / Go to checkout -->
          <button class="btn btnPrimary btnFull" id="goToBookingCartBtn">
            下一步：確認預約結帳 <i class="bi bi-arrow-right"></i>
          </button>

          <!-- 略過直接結帳 / Skip to checkout -->
          <a href="./booking-cart.html" class="rentalSkipLink rentalSkipLinkBooking" id="skipRentalLink">
            略過裝備，直接前往結帳 →
          </a>
        </aside>
      </div>
    </main>

    <!-- 預約系統專屬 Footer / Booking footer -->
    <div id="bookingFooter"></div>
    <script src="/booking/js/layout.js"></script>
    <!-- 共用：config／formatters／api-mock／booking-api（見 booking/partials/booking-core-scripts.partial） -->
    <script src="/booking/js/booking-core-scripts.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
      $(function () {
        // 載入預約系統專屬 Header / Footer（非買家端的 ../components/）
        window.loadBookingSharedLayout();
      });
    </script>
    <script src="/booking/js/booking-utils.js"></script>
    <script src="/booking/js/camp-rental.js"></script>
  </body>
</html>
