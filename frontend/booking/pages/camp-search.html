<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#73816E" />
    <meta name="description" content="搜尋並篩選台灣最美露營區，選擇最適合你的營地。" />
    <link rel="icon" href="/assets/icons/camping_icon.png" type="image/png" />
    <title>搜尋營區 | Yuruicamp 露營選物</title>

    <link rel="stylesheet" href="/booking/css/booking-main.css" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
  </head>

  <body>
    <div id="bookingHeader" class="bookingHeaderMount"></div>

    <section class="heroBanner" id="heroBanner">
      <video autoplay loop muted playsinline>
        <source src="/assets/videos/hero_video.mp4" type="video/mp4" />
      </video>

      <div class="heroContent">
        <h1 class="heroTitle">尋找你的山林棲所</h1>
        <p class="heroSubtitle">在這裡，選擇屬於你的季節與寧靜</p>

        <section class="searchBarSection">
          <div class="searchBar">
            <input
              type="text"
              id="dateRange"
              class="searchBarInput dateRangeSearchInput"
              placeholder="入住日期 → 退房日期"
              readonly
              aria-label="預約日期範圍"
            />

            <select id="guestCount" class="searchBarSelect searchGuestSelect" title="人數">
              <option value="">人數</option>
              <option value="1">1 人</option>
              <option value="2">2 人</option>
              <option value="4">4 人</option>
              <option value="6">6 人以上</option>
            </select>
            <select id="regionFilter" class="searchBarSelect searchRegionSelect" title="地區">
              <option value="">所有地區</option>
              <option value="北部">北部</option>
              <option value="中部">中部</option>
              <option value="南部">南部</option>
              <option value="東部">東部</option>
            </select>
            <button id="searchBtn" class="btn btnPrimary"><i class="bi bi-search"></i> 搜尋</button>
          </div>
        </section>
      </div>
    </section>

    <main class="searchPage">
      <div class="searchLayout">
        <aside class="filterSidebar">
          <button class="filterSidebarToggle" id="filterToggle" aria-expanded="false">
            <i class="bi bi-funnel"></i>&nbsp; 篩選條件
          </button>

          <div class="filterSidebarBody" id="filterBody">
            <div class="filterGroup">
              <h4 class="filterGroupTitle">環境特徵</h4>
              <label><input type="checkbox" name="env" value="高海拔" /> 高海拔</label>
              <label><input type="checkbox" name="env" value="低海拔" /> 低海拔</label>
              <label><input type="checkbox" name="env" value="有雲海" /> 有雲海</label>
              <label><input type="checkbox" name="env" value="有溪流" /> 有溪流</label>
              <label><input type="checkbox" name="env" value="森林系" /> 森林系</label>
            </div>

            <div class="filterGroup">
              <h4 class="filterGroupTitle">營區設施</h4>
              <label><input type="checkbox" name="facility" value="有雨棚" />有雨棚</label>
              <label><input type="checkbox" name="facility" value="裝備租借" />裝備租借</label>
              <label><input type="checkbox" name="facility" value="小木屋" />小木屋</label>
              <label><input type="checkbox" name="facility" value="寵物友善" /> 寵物友善</label>
              <label><input type="checkbox" name="facility" value="兒童遊樂設施" />兒童遊樂設施</label>
              <label><input type="checkbox" name="facility" value="獨立衛浴" />獨立衛浴</label>
              <label><input type="checkbox" name="facility" value="可包區" /> 可包區</label>
            </div>

            <div class="filterGroup">
              <h4 class="filterGroupTitle">每晚預算（平日）</h4>
              <div class="priceRangeSlider">
                <div class="priceRangeDisplay" id="priceRangeDisplay">NT$500 - NT$5,000+</div>
                <div class="priceRangeTrackWrap">
                  <div class="priceRangeFill" id="priceRangeFill"></div>
                  <input
                    type="range"
                    id="priceMin"
                    class="priceRangeThumb priceRangeThumbMin"
                    min="500"
                    max="5000"
                    step="500"
                    value="500"
                  />
                  <input
                    type="range"
                    id="priceMax"
                    class="priceRangeThumb priceRangeThumbMax"
                    min="500"
                    max="5000"
                    step="500"
                    value="5000"
                  />
                </div>
                <div class="priceRangeLabels">
                  <span>NT$500</span>
                  <span>NT$5,000+</span>
                </div>
              </div>
            </div>

            <button id="resetFilterBtn" class="btn btnOutline resetFilterButtonBooking">
              <i class="bi bi-arrow-counterclockwise"></i> 重設篩選
            </button>
          </div>
        </aside>

        <section class="searchResults">
          <div class="searchResultsHeader">
            <p id="resultCount">載入中...</p>
          </div>

          <div class="campCardGrid" id="campCardGrid">
            <div class="loadingSkeleton" id="loadingSkeleton">
              <i class="bi bi-hourglass-split"></i> 載入營區資料中...
            </div>
          </div>
        </section>
      </div>
    </main>

    <div id="bookingFooter"></div>

    <script src="/booking/js/layout.js"></script>
    <!-- 共用：config／formatters／api-mock／booking-api（見 booking/partials/booking-core-scripts.partial） -->
    <script src="/booking/js/booking-core-scripts.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh-tw.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>

    <script>
      // 載入共用的 Header / Footer
      // Load shared header and footer components
      $(function () {
        // 載入預約系統專屬 Header / Footer（非買家端的 ../components/）
        window.loadBookingSharedLayout();
      });
    </script>
    <script src="/storefront/js/booking-availability.js"></script>
    <script src="/storefront/js/components/card-gallery.js"></script>
    <script src="/booking/js/camp-search.js"></script>
  </body>
</html>
