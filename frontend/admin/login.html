<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yuruicamp 賣家後台 — 登入</title>

  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <!-- Font Awesome 6 圖示庫 -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- 後台專屬樣式 -->
  <link rel="stylesheet" href="css/admin.css">

  <style>
    /* 登入頁獨立樣式：深色漸層背景 */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e2329 0%, #2d3748 50%, #1a2a3a 100%);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(36, 77, 77, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(36, 77, 77, 0.2) 0%, transparent 40%);
      pointer-events: none;
    }

    .login-provider-btn {
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
  </style>
</head>
<body>

  <!-- ========== 登入卡片 ========== -->
  <div class="card shadow-lg login-card position-relative">
    <div class="card-body">

      <div class="text-center mb-4">
        <div class="mb-3">
          <i class="fas fa-campground fs-1" style="color: var(--admin-brand-accent);"></i>
        </div>
        <h4 class="fw-bold mb-1" style="color: var(--admin-brand-accent);">
          Yuruicamp 後台
        </h4>
        <p class="text-muted small mb-0">賣家管理系統 · Firebase Google 登入</p>
      </div>

      <!-- 正式：Google（email 必須已在 admin_users 白名單） -->
      <button type="button"
              class="btn w-100 text-white fw-semibold py-2 mb-3"
              style="background-color: var(--admin-brand-accent);"
              id="googleLoginBtn">
        <i class="fab fa-google me-2"></i>使用 Google 登入後台
      </button>

      <!-- 本機開發：Dev Token（僅 development + 後端 FIREBASE_ENABLED=false） -->
      <div id="devLoginPanel" class="d-none">
        <hr class="border-secondary opacity-25">
        <p class="small text-muted mb-2">
          <i class="fas fa-flask me-1"></i>
          本機開發：後端若關閉真 Firebase（<code>FIREBASE_ENABLED=false</code>），
          可用 Seed 管理員 Dev Token 驗收。
        </p>
        <button type="button"
                class="btn btn-outline-light login-provider-btn w-100 py-2"
                id="devTokenLoginBtn">
          <i class="fas fa-key me-2"></i>本機 Dev Token 登入
        </button>
      </div>

      <div class="text-center mt-4" id="mockLoginHint">
        <small class="text-muted">
          <i class="fas fa-info-circle me-1"></i>
          Google 帳號的 email 必須已存在於 <code>admin_users</code>。
          本機加入方式見
          <code>docs/seed/dev/021-admin-google-whitelist.example.sql</code>
        </small>
      </div>

      <div id="loginError" class="alert alert-danger mt-3 d-none small mb-0" role="alert"></div>

    </div>
  </div>

  <!-- ========== JavaScript ========== -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/storefront/js/config.js"></script>
  <script src="/storefront/js/api-client.js"></script>
  <!-- ADMIN_SECTIONS（權限對應需要）+ AdminAuth -->
  <script src="js/permissions.js"></script>
  <script src="js/admin-api.js"></script>
  <script src="js/admin-runtime.js"></script>
  <script src="js/admin-auth.js"></script>

</body>
</html>
