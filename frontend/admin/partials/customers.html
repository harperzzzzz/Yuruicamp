<!-- partials/customers.html
     客戶管理頁面
     由 core.js 的 $.load() 注入到 #contentArea
     桌面：表格 + 可展開列；手機：卡片 + 可展開詳情
     篩選（會員等級/標籤）+ 排序（註冊日期/消費總額）由 customers.js 驅動
-->

<div class="card shadow-sm border-0">

  <!-- 工具列：標題 + 新增客戶 -->
  <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center py-3">
    <h6 class="fw-semibold mb-0">
      <i class="fas fa-users me-2 text-muted"></i>客戶管理
    </h6>
    <button type="button" class="btn btn-sm text-white" id="addCustomerBtn"
            style="background-color: var(--admin-brand-accent);">
      <i class="fas fa-plus me-1"></i>新增客戶
    </button>
  </div>

  <!-- 桌面：清除條件（有篩選或排序時才顯示 card-header） -->
  <div class="card-header bg-white border-0 d-none justify-content-end align-items-center py-3"
       id="customerClearHeader">
    <button type="button" id="btnClearCustomerConditions"
            class="btn btn-sm btn-outline-secondary d-none">
      <i class="fas fa-rotate-left me-1"></i>清除條件
    </button>
  </div>

  <!-- 桌面：表格（md 以上） -->
  <div class="card-body p-0 d-none d-md-block">
    <div class="table-responsive">
      <table class="table table-hover mb-0 admin-data-table customer-list-table" id="customersTable">
        <thead class="table-light">
          <tr>
            <th>客戶姓名</th>
            <th>手機號碼</th>
            <th>電子信箱</th>
            <!-- 註冊日期：ISO 字串排序（YYYY-MM-DD） -->
            <th class="sortable-th" data-sort-key="registeredAt">
              註冊日期 <i class="fas fa-sort sort-icon ms-1"></i>
            </th>
            <!-- 會員等級：多選篩選（欄內 OR，與標籤 AND 疊加） -->
            <th class="filter-th" data-filter-key="tier">
              會員等級
              <i class="fas fa-filter filter-icon ms-1"></i>
              <span class="filter-dot d-none"></span>
              <div class="filter-dropdown d-none">
                <label><input type="checkbox" value="探險家"> 探險家</label>
                <label><input type="checkbox" value="嚮導"> 嚮導</label>
                <label><input type="checkbox" value="大師"> 大師</label>
              </div>
            </th>
            <!-- 消費總額：三段式排序 -->
            <th class="sortable-th" data-sort-key="totalSpent">
              消費總額 <i class="fas fa-sort sort-icon ms-1"></i>
            </th>
            <!-- 點數餘額：純顯示，不可排序 / Points balance display only -->
            <th>點數餘額</th>
            <!-- 標籤：多選篩選（選項由 tagColorMap 動態填入） -->
            <th class="filter-th" data-filter-key="tags">
              標籤
              <i class="fas fa-filter filter-icon ms-1"></i>
              <span class="filter-dot d-none"></span>
              <div class="filter-dropdown d-none" id="customerTagsFilterDropdown">
                <!-- buildCustomerTagsFilterOptions() 動態填入 -->
              </div>
            </th>
            <!-- 展開箭頭欄（無標題，僅提示可展開） -->
            <th class="cell-expand" style="width:2rem" aria-label="展開"></th>
          </tr>
        </thead>
        <tbody id="customersTableBody">
          <tr>
            <td colspan="9" class="text-center py-4">
              <div class="spinner-border spinner-border-sm me-2"
                   style="color: var(--admin-brand-accent);"></div>
              <span class="text-muted">載入會員資料中...</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 手機：篩選列 + 卡片列表 -->
  <div class="d-md-none">
    <div id="customersMobileFilters" class="border-bottom p-3 bg-light">
      <div class="mb-2">
        <label class="form-label small text-muted mb-1">會員等級</label>
        <div class="d-flex flex-wrap gap-2" id="mobileTierFilters">
          <label class="small"><input type="checkbox" class="mobile-tier-cb" value="探險家"> 探險家</label>
          <label class="small"><input type="checkbox" class="mobile-tier-cb" value="嚮導"> 嚮導</label>
          <label class="small"><input type="checkbox" class="mobile-tier-cb" value="大師"> 大師</label>
        </div>
      </div>
      <div class="mb-2">
        <label class="form-label small text-muted mb-1">標籤</label>
        <div class="d-flex flex-wrap gap-2" id="mobileTagsFilters">
          <!-- 動態填入 -->
        </div>
      </div>
      <div class="mb-2">
        <label class="form-label small text-muted mb-1" for="mobileCustomerSort">消費總額排序</label>
        <select id="mobileCustomerSort" class="form-select form-select-sm">
          <option value="">預設（不排序）</option>
          <option value="asc">低 → 高</option>
          <option value="desc">高 → 低</option>
        </select>
      </div>
      <div>
        <button type="button" id="btnClearCustomerConditionsMobile"
                class="btn btn-sm btn-outline-secondary d-none w-100">
          <i class="fas fa-rotate-left me-1"></i>清除條件
        </button>
      </div>
    </div>
    <div id="customersCardList">
      <div class="text-center py-5">
        <div class="spinner-border spinner-border-sm me-2"
             style="color: var(--admin-brand-accent);"></div>
        <span class="text-muted">載入會員資料中...</span>
      </div>
    </div>
  </div>
</div>

<!-- 新增客戶 Modal（由 customers.js 控制） -->
<div class="modal fade" id="addCustomerModal" tabindex="-1"
     aria-labelledby="addCustomerModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addCustomerModalLabel">新增客戶</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="關閉"></button>
      </div>
      <div class="modal-body">
        <form id="addCustomerForm" novalidate>
          <!-- 會員編號（自動產生，不可改） -->
          <div class="mb-3">
            <label class="form-label fw-semibold" for="newCustomerId">會員編號</label>
            <input type="text" class="form-control" id="newCustomerId" readonly>
          </div>

          <!-- 客戶姓名（必填） -->
          <div class="mb-3">
            <label class="form-label fw-semibold" for="newCustomerName">
              客戶姓名 <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="newCustomerName"
                   placeholder="例：王小明" required>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold" for="newCustomerPhone">
                手機號碼 <span class="text-danger">*</span>
              </label>
              <input type="tel" class="form-control" id="newCustomerPhone"
                     maxlength="10" inputmode="numeric" placeholder="0912345678" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold" for="newCustomerEmail">
                電子信箱 <span class="text-danger">*</span>
              </label>
              <input type="email" class="form-control" id="newCustomerEmail"
                     placeholder="name@example.com" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold" for="newCustomerBirthday">
                生日 <span class="text-danger">*</span>
              </label>
              <input type="date" class="form-control" id="newCustomerBirthday" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold" for="newCustomerRegisteredAt">
                註冊日期 <span class="text-danger">*</span>
              </label>
              <input type="date" class="form-control" id="newCustomerRegisteredAt" required>
            </div>
          </div>

          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label fw-semibold" for="newCustomerTierDisplay">會員等級</label>
              <input type="text" class="form-control" id="newCustomerTierDisplay"
                     value="探險家" readonly aria-readonly="true">
              <input type="hidden" id="newCustomerTier" value="explorer">
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label fw-semibold" for="newCustomerPoints">點數餘額</label>
              <input type="number" class="form-control" id="newCustomerPoints"
                     min="0" value="0">
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label fw-semibold" for="newCustomerTotalSpent">消費總額</label>
              <input type="number" class="form-control" id="newCustomerTotalSpent"
                     min="0" value="0">
            </div>
          </div>

          <!-- 標籤（多選，選項來自 tagColorMap） -->
          <div class="mb-2">
            <label class="form-label fw-semibold">標籤</label>
            <div id="newCustomerTagsList" class="border rounded p-2"></div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn text-white" id="saveCustomerBtn"
                style="background-color: var(--admin-brand-accent);">
          <i class="fas fa-save me-1"></i>儲存
        </button>
      </div>
    </div>
  </div>
</div>
