<!-- partials/movement.html
     庫存異動紀錄頁面
     由 core.js 的 $.load() 注入到 #contentArea
     表格數據由 movement.js 的 $.getJSON() 動態產生
     期間篩選 + 欄位排序/篩選由 movement.js 驅動
-->

<div class="card shadow-sm border-0">

  <!-- 卡片頂部：日期篩選 + 清除條件按鈕（結構對齊 orders.html） -->
  <div class="card-header bg-white border-0
              d-flex justify-content-between align-items-center flex-wrap gap-2 py-3">
    <div class="d-flex align-items-center flex-nowrap gap-2">
      <div class="btn-group btn-group-sm" id="movementPeriodBtns" role="group">
        <button type="button" class="btn btn-outline-secondary" data-days="7">近 7 天</button>
        <button type="button" class="btn btn-outline-secondary active" data-days="30">近 30 天</button>
        <button type="button" class="btn btn-outline-secondary" data-days="month">本月</button>
        <button type="button" class="btn btn-outline-secondary" data-days="90">近 3 個月</button>
        <button type="button" class="btn btn-outline-secondary" data-days="custom">
          <i class="fas fa-calendar-alt me-1"></i>自定義
        </button>
      </div>
      <input type="text" id="movementDateRangePicker"
             class="form-control form-control-sm flex-shrink-0"
             style="width: 176px; display: none; white-space: nowrap;"
             placeholder="開始日期 ~ 結束日期" readonly>
      <span class="text-muted small" id="movementPeriodLabel"></span>
    </div>
    <div class="d-flex gap-2">
      <button id="btnClearMovementSort" class="btn btn-sm btn-outline-secondary d-none">
        <i class="fas fa-rotate-left me-1"></i>清除條件
      </button>
      <button id="openMovementDraftModal" class="btn btn-sm btn-primary backend-movement-action d-none">
        <i class="fas fa-plus me-1"></i>建立異動草稿
      </button>
    </div>
  </div>

  <!-- 表格容器 -->
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover mb-0 admin-data-table" id="movementTable">
        <thead class="table-light">
          <tr>
            <th>異動編號</th>

            <!-- 異動日期：可排序（ISO 字串 YYYY-MM-DD 可直接比大小） -->
            <th class="sortable-th" data-sort-key="createdAt">
              異動日期 <i class="fas fa-sort sort-icon ms-1"></i>
            </th>

            <!-- 負責員工 ID：多選篩選（checkbox 由 movement.js 依資料動態填入） -->
            <th class="filter-th" data-filter-key="employeeId">
              負責員工 ID
              <i class="fas fa-filter filter-icon ms-1"></i>
              <span class="filter-dot d-none"></span>
              <div class="filter-dropdown d-none">
                <!-- populateEmployeeFilterOptions() 動態填入 -->
              </div>
            </th>

            <th>明細筆數</th>

            <th>狀態</th>

            <!-- 異動性質：多選篩選（比對 items[].type） -->
            <th class="filter-th" data-filter-key="movementType">
              異動性質
              <i class="fas fa-filter filter-icon ms-1"></i>
              <span class="filter-dot d-none"></span>
              <div class="filter-dropdown d-none">
                <label><input type="checkbox" value="進貨"> 進貨</label>
                <label><input type="checkbox" value="移轉"> 移轉</label>
                <label><input type="checkbox" value="調撥"> 調撥</label>
                <label><input type="checkbox" value="營地互轉"> 營地互轉</label>
                <label><input type="checkbox" value="損耗"> 損耗</label>
                <label><input type="checkbox" value="—"> 未分類</label>
              </div>
            </th>
          </tr>
        </thead>
        <!-- tbody 由 movement.js 的 renderMovementTable() 動態填入 -->
        <tbody id="movementTableBody">
          <tr>
            <td colspan="6" class="text-center py-4">
              <div class="spinner-border spinner-border-sm me-2"
                   style="color: var(--admin-brand-accent);"></div>
              <span class="text-muted">載入庫存異動紀錄中...</span>
            </td>
          </tr>
          <!-- colspan 需對應 thead 6 欄 -->
        </tbody>
      </table>
    </div>
  </div><!-- end card-body -->

</div><!-- end card -->

<!-- 庫存異動明細 Modal -->
<div class="modal fade" id="movementDetailModal" tabindex="-1"
     aria-labelledby="movementDetailModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="movementDetailModalLabel">
          庫存異動明細 — <span id="modalMovementId" class="text-muted"></span>
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3 mb-3">
          <div class="col-sm-4">
            <small class="text-muted d-block">異動日期</small>
            <span id="modalMovementDate" class="fw-semibold"></span>
          </div>
          <div class="col-sm-4">
            <small class="text-muted d-block">員工 ID</small>
            <span id="modalMovementEmployeeId" class="fw-semibold"></span>
          </div>
          <div class="col-sm-4">
            <small class="text-muted d-block">狀態</small>
            <span id="modalMovementStatus"></span>
          </div>
          <div class="col-sm-6">
            <small class="text-muted d-block">庫存領域</small>
            <span id="modalMovementDomain" class="fw-semibold"></span>
          </div>
          <div class="col-sm-6">
            <small class="text-muted d-block">原因</small>
            <span id="modalMovementReason" class="fw-semibold"></span>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-sm table-bordered mb-0">
            <thead class="table-light">
              <tr>
                <th>商品名稱</th>
                <th class="text-center">數量</th>
                <th>配送地</th>
                <th>接收地</th>
                <th>異動性質</th>
              </tr>
            </thead>
            <tbody id="modalMovementItems">
              <!-- movement.js 動態填入 -->
            </tbody>
          </table>
        </div>
        <div id="draftMovementItemEditor" class="border rounded p-3 mt-3 d-none">
          <div class="small fw-semibold mb-2">新增草稿明細</div>
          <div class="row g-2 align-items-end">
            <div class="col-md-8">
              <label class="form-label small">商品規格</label>
              <select id="draftMovementVariant" class="form-select form-select-sm"></select>
            </div>
            <div class="col-md-2">
              <label class="form-label small">數量</label>
              <input id="draftMovementQuantity" type="number" min="1" value="1"
                     class="form-control form-control-sm">
            </div>
            <div class="col-md-2 d-grid">
              <button id="addDraftMovementItem" type="button" class="btn btn-sm btn-outline-primary">
                新增
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer backend-movement-action d-none">
        <button id="cancelMovementDraft" type="button" class="btn btn-outline-danger d-none">作廢草稿</button>
        <button id="postMovementDraft" type="button" class="btn btn-primary d-none">確認過帳</button>
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">關閉</button>
      </div>
    </div>
  </div>
</div>

<!-- Backend 模式建立 draft，庫存只會在後續過帳時改動。 -->
<div class="modal fade" id="movementDraftModal" tabindex="-1"
     aria-labelledby="movementDraftModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <form class="modal-content" id="movementDraftForm">
      <div class="modal-header">
        <h5 class="modal-title" id="movementDraftModalLabel">建立庫存異動草稿</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="alert alert-light border small">
          建立草稿不會改動庫存；確認規格與庫位後，請到明細執行過帳。
        </div>
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">庫存領域</label>
            <select id="movementDomain" class="form-select" required>
              <option value="store">商城庫存</option>
              <option value="rental">租借庫存</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">異動類型</label>
            <select id="movementType" class="form-select" required>
              <option value="receipt">入庫</option>
              <option value="write_off">出庫／損耗</option>
              <option value="transfer">同領域調撥</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">發生時間</label>
            <input id="movementOccurredAt" type="datetime-local" class="form-control">
          </div>
          <div class="col-md-6" id="movementSourceGroup">
            <label class="form-label">來源庫位</label>
            <select id="movementSourceLocation" class="form-select"></select>
          </div>
          <div class="col-md-6" id="movementDestinationGroup">
            <label class="form-label">目的庫位</label>
            <select id="movementDestinationLocation" class="form-select"></select>
          </div>
          <div class="col-12">
            <label class="form-label">原因</label>
            <textarea id="movementReason" class="form-control" rows="2" maxlength="1000" required></textarea>
          </div>
        </div>
        <hr>
        <div class="d-flex justify-content-between align-items-center mb-2">
          <div class="fw-semibold">草稿明細</div>
          <button id="addMovementDraftRow" type="button" class="btn btn-sm btn-outline-secondary">
            <i class="fas fa-plus me-1"></i>新增規格
          </button>
        </div>
        <div id="movementDraftRows" class="vstack gap-2"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
        <button id="submitMovementDraft" type="submit" class="btn btn-primary">建立草稿</button>
      </div>
    </form>
  </div>
</div>
