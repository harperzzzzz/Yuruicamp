<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Yuruicamp 待付款預約，查看預約編號、金額與付款期限。" />
    <meta name="theme-color" content="#73816e" />
    <link rel="icon" href="/assets/icons/camping_icon.png" type="image/png" />
    <title>預約已建立 | Yuruicamp 營地預約</title>

    <!-- 成功頁版型沿用主站 checkout-success 樣式 / Reuse main checkout-success styles -->
    <link rel="stylesheet" href="/storefront/css/main.css" />
    <link rel="stylesheet" href="/booking/css/booking-main.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
  </head>
  <body>
    <div id="bookingHeader" class="bookingHeaderMount"></div>

    <main class="checkoutSuccessPage">
      <section class="checkoutSuccess" aria-labelledby="successTitle">
        <div class="checkoutSuccessDecoration checkoutSuccessDecorationTop" aria-hidden="true"></div>
        <div class="checkoutSuccessDecoration checkoutSuccessDecorationBottom" aria-hidden="true"></div>
        <div class="successIconWrap" aria-hidden="true"><span class="successIcon">✓</span></div>
        <div class="successContent">
          <h1 class="successTitle" id="successTitle">待付款預約已建立</h1>
          <p class="successDescription">
            營位與租借裝備已暫時保留 15 分鐘。線 D 完成前不會進行真正付款，狀態維持未付款。
          </p>
          <dl class="orderNumberPanel">
            <dt class="orderNumberLabel">預約編號</dt>
            <dd class="orderNumberValue isLoading" id="bookingNumberDisplay" aria-live="polite">載入中...</dd>
          </dl>
          <dl class="orderNumberPanel" aria-label="待付款資訊">
            <dt class="orderNumberLabel">後端計算金額</dt>
            <dd class="orderNumberValue" id="bookingFinalAmount">NT$0</dd>
            <dt class="orderNumberLabel">付款狀態</dt>
            <dd class="orderNumberValue" id="bookingPaymentStatus">未付款</dd>
            <dt class="orderNumberLabel">保留倒數</dt>
            <dd class="orderNumberValue" id="bookingCountdown" aria-live="polite">--:--</dd>
          </dl>
          <div class="successActions">
            <a class="successAction successActionPrimary" href="./member-center.html">查看預約明細</a>
            <a class="successAction successActionSecondary" href="./camp-search.html">再預約一次露營</a>
          </div>

          <!-- 結帳後導購 / Post-checkout upsell -->
          <div class="checkoutUpsellBannerBooking bookingSuccessUpsell" id="upsellBanner">
            <p>🎉 喜歡這次的裝備體驗嗎？</p>
            <p>前往選購屬於你的露營裝備，下次露營更輕鬆。</p>
            <a href="../../storefront/pages/products.html" class="btn btnOutline btnFull">
              <i class="bi bi-shop"></i> 前往選購新裝備
            </a>
          </div>
        </div>
      </section>
    </main>

    <div id="bookingFooter"></div>

    <script src="/booking/js/layout.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
      $(function () {
        window.loadBookingSharedLayout && window.loadBookingSharedLayout();
      });
    </script>
    <script src="/storefront/js/formatters.js"></script>
    <script src="/storefront/js/components/success-effects.js" defer></script>
    <script>
      (function initBookingSuccessPage() {
        const bookingNumberDisplay = document.getElementById('bookingNumberDisplay');
        const checkoutSession = readCheckoutSession();
        const bookingNum = readBookingNumber();
        if (bookingNumberDisplay) {
          const normalized = String(bookingNum || '--').replace(/^#/, '');
          bookingNumberDisplay.textContent = normalized === '--' ? '#--' : '#' + normalized;
          bookingNumberDisplay.classList.remove('isLoading');
        }

        renderCheckoutSession(checkoutSession);
      })();

      /** 只讀結帳頁交接的 Session，不把它當成可自行修改的付款真相。 */
      function readCheckoutSession() {
        try {
          return JSON.parse(sessionStorage.getItem('lastCheckoutBooking') || 'null');
        } catch (error) {
          console.warn('[booking-success] 讀取 Checkout Session 失敗', error);
          return null;
        }
      }

      /** 顯示後端 pricing 與 checkoutExpiresAt，倒數歸零不自行改寫 Booking 狀態。 */
      function renderCheckoutSession(session) {
        if (!session) return;

        var pricing = session.pricing || {};
        var amount =
          pricing.finalAmount != null
            ? Number(pricing.finalAmount)
            : Number(session.summary && session.summary.finalAmount);
        var amountElement = document.getElementById('bookingFinalAmount');
        var paymentElement = document.getElementById('bookingPaymentStatus');
        var countdownElement = document.getElementById('bookingCountdown');

        if (amountElement && Number.isFinite(amount)) {
          amountElement.textContent = 'NT$' + amount.toLocaleString('zh-TW');
        }
        if (paymentElement) {
          paymentElement.textContent = session.paymentStatus === 'paid' ? '已付款' : '未付款';
        }
        if (!countdownElement || !session.checkoutExpiresAt) return;

        function updateCountdown() {
          var remaining = Date.parse(session.checkoutExpiresAt) - Date.now();
          if (remaining <= 0) {
            countdownElement.textContent = '已到期，請重新查詢預約狀態';
            return false;
          }

          var totalSeconds = Math.ceil(remaining / 1000);
          var minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
          var seconds = String(totalSeconds % 60).padStart(2, '0');
          countdownElement.textContent = minutes + ':' + seconds;
          return true;
        }

        if (updateCountdown()) {
          var timer = window.setInterval(function () {
            if (!updateCountdown()) {
              window.clearInterval(timer);
            }
          }, 1000);
        }
      }

      /** 將 booking id 轉成顯示用編號 / Format booking id for display */
      function toBookingDisplayNum(id) {
        if (id == null || id === '') return '';
        var formatted = window.formatBookingDisplayId ? window.formatBookingDisplayId(id) : '';
        return formatted || String(id);
      }

      /** 從 URL 或 storage 讀取預約編號 / Read booking number from URL or storage */
      function readBookingNumber() {
        var params = new URLSearchParams(window.location.search);
        var queryBookingNum = params.get('bookingNum');
        // 排除空字串，避免 ?bookingNum= 被當成有效值
        // Reject empty query value so ?bookingNum= is not treated as valid
        if (queryBookingNum && queryBookingNum.trim()) {
          return queryBookingNum.trim();
        }

        // 備援 1：sessionStorage（同分頁跳轉最可靠）
        // Fallback 1: sessionStorage from same-tab redirect
        try {
          var sessionBooking = JSON.parse(sessionStorage.getItem('lastCheckoutBooking') || 'null');
          if (sessionBooking && (sessionBooking.bookingId || sessionBooking.id) != null) {
            return toBookingDisplayNum(sessionBooking.bookingId || sessionBooking.id);
          }
        } catch (error) {
          console.warn('[booking-success] 讀取 sessionStorage 失敗', error);
        }

        // 備援 2：localStorage 結帳頁寫入的最後一筆預約
        // Fallback 2: last booking saved at checkout
        try {
          var lastBooking = JSON.parse(localStorage.getItem('lastCheckoutBooking') || 'null');
          if (lastBooking && (lastBooking.bookingId || lastBooking.id) != null) {
            return toBookingDisplayNum(lastBooking.bookingId || lastBooking.id);
          }
        } catch (error) {
          console.warn('[booking-success] 讀取 lastCheckoutBooking 失敗', error);
        }

        return '';
      }
    </script>
  </body>
</html>
