<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Yuruicamp 露營生活誌 - 探索戶外的每一步，都是故事。新手教學、景點推薦、生活技巧與裝備評測一次看。"
    />
    <meta name="theme-color" content="#244d4d" />
    <title>露營生活誌 - Yuruicamp 露營選物</title>
    <link rel="preconnect" href="https://picsum.photos" />
    <link rel="dns-prefetch" href="https://picsum.photos" />
    <link rel="stylesheet" href="/storefront/css/main.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏕️</text></svg>"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="header"></div>

    <main class="blogPage">
      <section class="blogHero" aria-labelledby="blogPageTitle">
        <div class="blogHeroContent">
          <p class="blogHeroKicker">Yuruicamp Journal</p>
          <h1 class="blogHeroTitle" id="blogPageTitle">露營生活誌</h1>
          <p class="blogHeroDescription">探索戶外的每一步，都是故事。整理新手教學、景點推薦、生活技巧與裝備評測。</p>
        </div>
      </section>

      <div class="blogContent">
        <section class="blogFeaturedSection isLoading" id="featuredArticle" aria-live="polite" aria-labelledby="blogFeaturedTitle">
          <div class="blogLoadingState" role="status">
            <span class="blogLoadingIcon" aria-hidden="true"></span>
            <span>載入精選文章中...</span>
          </div>
        </section>

        <nav class="blogCategoryTabs" id="categoryTabs" aria-label="文章分類">
          <button class="blogCategoryTab isActive" type="button" data-cat="all" aria-pressed="true">全部</button>
          <button class="blogCategoryTab" type="button" data-cat="新手教學" aria-pressed="false">新手教學</button>
          <button class="blogCategoryTab" type="button" data-cat="景點推薦" aria-pressed="false">景點推薦</button>
          <button class="blogCategoryTab" type="button" data-cat="生活技巧" aria-pressed="false">生活技巧</button>
          <button class="blogCategoryTab" type="button" data-cat="裝備評測" aria-pressed="false">裝備評測</button>
        </nav>

        <section class="blogArticlesSection" aria-labelledby="blogArticlesTitle">
          <div class="blogArticlesHeader">
            <h2 class="blogArticlesTitle" id="blogArticlesTitle">最新文章</h2>
            <p class="blogArticlesDescription" id="blogArticlesDescription">依照分類篩選你感興趣的露營內容。</p>
          </div>
          <div class="blogArticlesGrid isLoading" id="articlesGrid" aria-live="polite">
            <div class="blogLoadingState" role="status">
              <span class="blogLoadingIcon" aria-hidden="true"></span>
              <span>載入文章中...</span>
            </div>
          </div>
        </section>

        <div class="blogEmptyState isHidden" id="noArticles" role="status" hidden>
          <div class="blogEmptyIcon" aria-hidden="true"><i class="bi bi-journal-x"></i></div>
          <p>目前沒有符合條件的文章</p>
        </div>
      </div>
    </main>

    <div id="footer"></div>
    <script src="/storefront/js/config.js" defer></script>
    <script src="/storefront/js/api-client.js" defer></script>
    <script src="/storefront/js/storage.js" defer></script>
    <script src="/storefront/js/state.js" defer></script>
    <script src="/storefront/js/formatters.js" defer></script>
    <script src="/storefront/js/validators.js" defer></script>
    <script src="/storefront/js/cart-service.js" defer></script>
    <script src="/storefront/js/api-mock.js" defer></script>
    <script src="/storefront/js/components/toast.js" defer></script>
    <script src="/storefront/js/components/modal.js" defer></script>
    <script src="/storefront/js/components/header.js" defer></script>
    <script src="/storefront/js/components/cart.js" defer></script>
    <script src="/storefront/js/pages/blog.js" defer></script>
    <script src="/storefront/js/main.js" defer></script>
  </body>
</html>
