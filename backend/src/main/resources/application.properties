# 固定從 \backend 資料夾位置啟動
spring.config.import=file:../.env[.properties]

spring.application.name=backend

# Local defaults match docker-compose.yml; override with env vars in real deploys.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/yuruicamp}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# The database must be initialized from docs/latest_schema.sql before the app starts.
# Hibernate only validates mappings; it must not create or mutate the schema.
spring.jpa.hibernate.ddl-auto=validate

ecpay.merchant-id=${ECPAY_MERCHANT_ID:3002607}
ecpay.hash-key=${ECPAY_HASH_KEY:pwFHCqoQZGmho4w6}
ecpay.hash-iv=${ECPAY_HASH_IV:EkRm7iFT261dpevs}
ecpay.payment-url=${ECPAY_PAYMENT_URL:https://payment-stage.ecpay.com.tw/Cashier/AioCheckOut/V5}
ecpay.return-url=${ECPAY_RETURN_URL:https://tanned-cheddar-panama.ngrok-free.dev/api/payments/ecpay/return}
ecpay.order-result-url=${ECPAY_ORDER_RESULT_URL:http://localhost:8080/api/payments/ecpay/order-result}
ecpay.checkout-success-url=${CHECKOUT_SUCCESS_URL:http://localhost:5173/storefront/pages/checkout-success.html}



spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Date ISO-8601 is configured in JacksonConfig (Boot 4 / Jackson 3 no longer
# supports spring.jackson.serialization.write-dates-as-timestamps).

# CORS for Vite frontend (http://127.0.0.1:5173)
yuruicamp.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://127.0.0.1:5173,http://localhost:5173}

# Firebase Auth: verify ID tokens only (backend does NOT issue its own JWT).
# When enabled=false, DevFirebaseTokenVerifier accepts tokens starting with "dev:".
yuruicamp.firebase.enabled=${FIREBASE_ENABLED:false}
yuruicamp.firebase.credentials-path=${FIREBASE_CREDENTIALS:}

# OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
