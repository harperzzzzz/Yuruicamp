spring.application.name=backend
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Flyway is the only schema owner. Never enable automatic baseline or clean.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.default-schema=public
spring.flyway.schemas=public,migration
spring.flyway.validate-on-migrate=true
spring.flyway.validate-migration-naming=true
spring.flyway.baseline-on-migrate=false
spring.flyway.clean-disabled=true
spring.flyway.fail-on-missing-locations=true
spring.flyway.out-of-order=false
spring.flyway.execute-in-transaction=true

# Hibernate validates mappings but must not create or mutate the schema.
spring.jpa.hibernate.ddl-auto=validate

# P7 contract defaults. The owner waiver authorized V700 without deployed
# observation evidence; normalized structures are the only writable model.
# The environment override remains available only for disaster diagnostics and
# cannot recreate compatibility objects removed by V700.
database.migration.p7.read-new=${DATABASE_MIGRATION_P7_READ_NEW:true}
database.migration.p7.write-legacy=${DATABASE_MIGRATION_P7_WRITE_LEGACY:false}
