# Tests assume local Docker Postgres with docs/latest_schema.sql applied.
spring.datasource.url=jdbc:postgresql://localhost:5433/yuruicamp
spring.datasource.username=postgres
# Must match docker-compose /.env POSTGRES_PASSWORD when RUN_BACKEND_IT=true
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

yuruicamp.firebase.enabled=false
yuruicamp.cors.allowed-origins=http://127.0.0.1:5173
